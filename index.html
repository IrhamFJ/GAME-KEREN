<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAM_CITY V2.0 - STABLE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --city-sky: #87CEEB; --action-blue: #007bff; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; outline: none; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; overflow: hidden; touch-action: none; }
        
        /* MENU UTAMA */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(to bottom, #1a1a1a, #000); color: white; z-index: 1000; position: relative; }
        .btn { padding: 18px 45px; border: none; background: #fff; cursor: pointer; font-weight: 900; margin: 12px; width: 280px; border-radius: 15px; font-size: 1.1rem; text-transform: uppercase; transition: all 0.2s ease; box-shadow: 0 4px 0 #bbb; }
        .btn-blue { background: var(--action-blue); color: white; box-shadow: 0 4px 0 #0056b3; }
        .btn:active { transform: translateY(4px); box-shadow: none; opacity: 0.9; }
        
        /* HOST UI */
        #ui-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; display: none; }
        .kode-box { background: rgba(0,0,0,0.85); color: #00ff00; padding: 15px 25px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 1.6rem; border: 2px solid #00ff00; }

        /* CONTROLLER HP */
        #ctrl-view { display: none; height: 100vh; width: 100vw; background: #111; position: relative; }
        .joystick-area { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); display: grid; grid-template-columns: repeat(3, 95px); gap: 15px; }
        .joy-btn { width: 95px; height: 95px; background: rgba(255,255,255,0.08); border: 2px solid #444; border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; font-size: 2.8rem; }
        .active-btn { background: var(--action-blue) !important; border-color: #fff; transform: scale(0.92); }
        
        #target-id { padding: 20px; text-align: center; border: 3px solid #444; background: #222; color: #fff; width: 280px; font-size: 1.6rem; border-radius: 15px; margin-bottom: 30px; text-transform: uppercase; }
        
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="margin:0; font-size: 4.5rem; letter-spacing: -2px; font-weight: 900;">HAM CITY</h1>
        <p style="opacity: 0.5; letter-spacing: 8px; margin-bottom: 50px;">V2.0 STABLE ENGINE</p>
        <button class="btn" onclick="preStart('screen')">HOST SERVER (PC)</button>
        <button class="btn btn-blue" onclick="preStart('controller')">JOIN PLAYER (HP)</button>
    </div>

    <div id="ui-overlay"><div class="kode-box">SERVER ID: <span id="peer-id-text">...</span></div></div>

    <div id="ctrl-view">
        <div id="setup-ui" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; width: 100%;">
            <input type="text" id="target-id" placeholder="MASUKKAN KODE">
            <button class="btn btn-blue" onclick="connectToServer()">CONNECT</button>
        </div>
        <div id="game-pad" style="display: none; width: 100%; height: 100%;">
            <div class="joystick-area">
                <div></div><div class="joy-btn" id="btn-up">↑</div><div></div>
                <div class="joy-btn" id="btn-left">←</div><div class="joy-btn" id="btn-down">↓</div><div class="joy-btn" id="btn-right">→</div>
            </div>
        </div>
    </div>

    <script>
        let players = [], scene, renderer, peer;
        let keys = { up: false, down: false, left: false, right: false };
        const myCustomId = 'HAM-' + Math.floor(1000 + Math.random() * 8999);

        function preStart(type) {
            document.getElementById('menu').style.display = 'none';
            peer = new Peer(myCustomId);
            
            peer.on('error', (err) => {
                alert("PeerJS Error: " + err.type);
                location.reload();
            });

            if(type === 'screen') {
                document.getElementById('ui-overlay').style.display = 'block';
                document.getElementById('peer-id-text').innerText = myCustomId;
                initWorld();
            } else {
                document.getElementById('ctrl-view').style.display = 'block';
                setupMobileControls();
            }
        }

        function createCharacter(color) {
            const group = new THREE.Group();
            // Badan
            const body = new THREE.Mesh(
                new THREE.CapsuleGeometry(0.4, 0.9, 4, 12), 
                new THREE.MeshStandardMaterial({ color, roughness: 0.7 })
            );
            body.position.y = 1.05; body.castShadow = true; group.add(body);
            // Kepala
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.32, 16, 16), 
                new THREE.MeshStandardMaterial({ color: 0xffdbac })
            );
            head.position.y = 1.95; group.add(head);
            // Arah Mata
            const visor = new THREE.Mesh(
                new THREE.BoxGeometry(0.45, 0.12, 0.15), 
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );
            visor.position.set(0, 2.0, 0.28); group.add(visor);
            return group;
        }

        function initWorld() {
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 40, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.3);
            sun.position.set(40, 80, 40); sun.castShadow = true;
            sun.shadow.camera.left = -100; sun.shadow.camera.right = 100;
            sun.shadow.camera.top = 100; sun.shadow.camera.bottom = -100;
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            // Lantai & Trotoar
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);
            
            const grid = new THREE.GridHelper(3000, 150, 0x000000, 0x555555);
            grid.position.y = 0.02; scene.add(grid);

            // Bangunan Sederhana
            for(let i=0; i<120; i++) {
                const h = Math.random()*35 + 10;
                const b = new THREE.Mesh(new THREE.BoxGeometry(10, h, 10), new THREE.MeshStandardMaterial({ color: 0x707070 }));
                b.position.set((Math.random()-0.5)*400, h/2, (Math.random()-0.5)*400);
                if(Math.abs(b.position.x) < 15 && Math.abs(b.position.z) < 15) b.position.x += 30;
                b.castShadow = true; b.receiveShadow = true; scene.add(b);
            }

            peer.on('connection', conn => {
                if(players.length >= 2) return; // Maksimal 2 player untuk split screen
                const pID = players.length + 1;
                const char = createCharacter(pID === 1 ? 0x007bff : 0xff3333);
                const p = { 
                    conn, id: pID, input: {up:0,down:0,left:0,right:0}, 
                    mesh: char, 
                    cam: new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000),
                    walkCycle: 0
                };
                char.position.set(pID === 1 ? 4 : -4, 0, 0);
                scene.add(char); players.push(p);
                
                conn.on('data', d => p.input = d);
                conn.on('close', () => location.reload()); // Refresh jika player diskonek
                
                if(players.length === 1) animate();
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const w = window.innerWidth, h = window.innerHeight;
            const isSplit = players.length > 1;

            players.forEach((p, i) => {
                // Logika Gerak GTA Style
                if(p.input.up) { p.mesh.translateZ(0.2); p.walkCycle += 0.28; }
                if(p.input.down) { p.mesh.translateZ(-0.12); p.walkCycle += 0.18; }
                if(p.input.left) p.mesh.rotation.y += 0.085;
                if(p.input.right) p.mesh.rotation.y -= 0.085;

                // Animasi Jalan
                p.mesh.position.y = (p.input.up || p.input.down) ? Math.abs(Math.sin(p.walkCycle)) * 0.18 : 0;

                // Kamera Follow Smooth
                const idealOffset = new THREE.Vector3(0, 4.5, -9).applyMatrix4(p.mesh.matrixWorld);
                p.cam.position.lerp(idealOffset, 0.15);
                p.cam.lookAt(p.mesh.position.x, p.mesh.position.y + 1.6, p.mesh.position.z);

                // Render Logic (Fixing Split Screen Aspect)
                if(isSplit) {
                    p.cam.aspect = w / (h / 2);
                    p.cam.updateProjectionMatrix();
                    renderer.setScissorTest(true);
                    const rect = i === 0 ? [0, h/2, w, h/2] : [0, 0, w, h/2];
                    renderer.setViewport(...rect); 
                    renderer.setScissor(...rect);
                } else {
                    p.cam.aspect = w / h;
                    p.cam.updateProjectionMatrix();
                    renderer.setScissorTest(false);
                    renderer.setViewport(0, 0, w, h);
                }
                renderer.render(scene, p.cam);
            });
        }

        function setupMobileControls() {
            const bind = (id, k) => {
                const el = document.getElementById(id);
                const handle = (val) => { 
                    keys[k] = val; 
                    if(window.currentConn) window.currentConn.send(keys); 
                    el.classList.toggle('active-btn', val); 
                };
                el.addEventListener('touchstart', (e) => { e.preventDefault(); handle(true); if(navigator.vibrate) navigator.vibrate(20); }, {passive: false});
                el.addEventListener('touchend', (e) => { e.preventDefault(); handle(false); }, {passive: false});
            };
            bind('btn-up', 'up'); bind('btn-down', 'down');
            bind('btn-left', 'left'); bind('btn-right', 'right');
        }

        function connectToServer() {
            const id = document.getElementById('target-id').value.toUpperCase().trim();
            if(!id) return;
            const conn = peer.connect(id);
            conn.on('open', () => { 
                window.currentConn = conn; 
                document.getElementById('setup-ui').style.display='none'; 
                document.getElementById('game-pad').style.display='block'; 
                if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            });
            conn.on('error', () => alert('Server Tidak Ditemukan!'));
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            if(renderer) renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
