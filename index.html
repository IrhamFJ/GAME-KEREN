<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Tap 1v1 P2P - LEGO Style</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        :root { --p1: #ff4757; --p2: #2e86de; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1c40f; color: #2c3e50; text-align: center; margin: 0; overflow: hidden; touch-action: none; }
        .screen { display: none; padding: 20px; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; }
        .active { display: flex; }
        
        button { padding: 18px 35px; font-size: 1.2rem; cursor: pointer; border: 4px solid #2c3e50; border-radius: 15px; margin: 10px; transition: 0.1s; background: #ecf0f1; color: #2c3e50; font-weight: 900; text-transform: uppercase; box-shadow: 6px 6px 0px #2c3e50; -webkit-tap-highlight-color: transparent; }
        button:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px #2c3e50; }
        input { padding: 15px; border: 4px solid #2c3e50; border-radius: 12px; width: 260px; font-size: 1.5rem; margin-bottom: 15px; text-align: center; background: #fff; font-family: monospace; font-weight: bold; }

        #room-id-display { background: #fff; color: #2c3e50; padding: 15px 30px; border: 5px solid #2c3e50; border-radius: 20px; font-size: 3.5rem; font-weight: 900; margin: 10px 0; letter-spacing: 5px; box-shadow: 8px 8px 0px #c0392b; }
        #track { display: none; width: 90%; height: 110px; background: #2c3e50; border: 6px solid #fff; border-radius: 55px; position: relative; margin: 25px 0; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .bar { height: 100%; transition: width 0.08s ease-out; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 2rem; color: white; text-shadow: 2px 2px #000; }
        #status-text { font-size: 2.2rem; color: #fff; text-transform: uppercase; margin: 15px 0; min-height: 1.2em; text-shadow: 4px 4px #c0392b; -webkit-text-stroke: 1.5px #2c3e50; }
        #round-info { font-size: 1.3rem; font-weight: 900; background: #fff; padding: 8px 25px; border-radius: 50px; border: 3px solid #2c3e50; margin-bottom: 10px; }

        .tap-area { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none; font-size: 5rem; font-weight: 900; color: white; user-select: none; }
    </style>
</head>
<body>

    <audio id="bgm-menu" loop preload="auto">
        <source src="https://image2url.com/r2/default/audio/1775290560696-3795209f-6e46-433c-a94c-18ac02c047a4.mp3" type="audio/mpeg">
    </audio>
    <audio id="bgm-battle" loop preload="auto">
        <source src="https://image2url.com/r2/default/audio/1775290622313-a7846eca-967a-4dcc-88dd-cb8e330cf6a6.mp3" type="audio/mpeg">
    </audio>

    <div id="menu-screen" class="screen active">
        <h1 style="font-size: 3rem; margin-bottom: 5px; -webkit-text-stroke: 1px #fff;">TAPTAP 1V1</h1>
        <p style="font-weight: bold; margin-bottom: 30px; letter-spacing: 1px;">LEGO-ISH ARCADE EDITION</p>
        <button onclick="startMonitorMode()">START MONITOR</button>
        <div style="margin: 20px 0; font-weight: bold; opacity: 0.7;">━━━━ OR ━━━━</div>
        <input type="text" id="join-id" placeholder="ENTER CODE" maxlength="5" spellcheck="false" autocomplete="off">
        <button onclick="initController()">JOIN BATTLE</button>
    </div>

    <div id="monitor-screen" class="screen">
        <div id="round-info">ROUND 1 - P1: 0 | P2: 0</div>
        <div id="room-id-display">.....</div>
        <h3 id="status-text">WAITING...</h3>
        <div id="track">
            <div id="bar-p1" class="bar" style="width: 50%; background: var(--p1);">P1</div>
            <div id="bar-p2" class="bar" style="width: 50%; background: var(--p2);">P2</div>
        </div>
    </div>

    <div id="controller-screen" class="screen" style="padding:0;">
        <button id="btn-tap" class="tap-area" disabled>CONNECTING...</button>
    </div>

    <script>
        let peer = null, players = { p1: null, p2: null };
        let score = 50, gameActive = false;
        let p1Wins = 0, p2Wins = 0, currentRound = 1;
        const menuAudio = document.getElementById('bgm-menu');
        const battleAudio = document.getElementById('bgm-battle');
        let audioCtx = null;

        // FIX: Autoplay BGM pas pertama kali masuk
        const enableAudio = () => {
            initAudio();
            if (menuAudio.paused && !players.p1 && !players.p2) {
                menuAudio.play().catch(() => {});
            }
            document.removeEventListener('click', enableAudio);
            document.removeEventListener('touchstart', enableAudio);
        };
        document.addEventListener('click', enableAudio);
        document.addEventListener('touchstart', enableAudio);

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTrumpet() {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.8);
        }

        function playMusic(mode) {
            menuAudio.pause();
            battleAudio.pause();
            if(mode === 'menu') {
                menuAudio.currentTime = 0;
                menuAudio.play().catch(() => {});
            } else if(mode === 'battle') {
                battleAudio.currentTime = 0;
                battleAudio.play().catch(() => {});
            }
        }

        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 1.1;
            if (callback) msg.onend = callback;
            window.speechSynthesis.speak(msg);
        }

        async function startMonitorMode() {
            initAudio();
            playMusic('menu');
            try {
                if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
                if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(()=>{});
            } catch (e) {}
            initMonitor();
        }

        function initMonitor() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let roomID = "";
            for(let i=0; i<5; i++) roomID += chars.charAt(Math.floor(Math.random() * chars.length));
            
            showScreen('monitor-screen');
            peer = new Peer(roomID);
            peer.on('open', id => { document.getElementById('room-id-display').innerText = id; });

            peer.on('connection', conn => {
                conn.on('open', () => {
                    let role = !players.p1 ? "p1" : (!players.p2 ? "p2" : null);
                    if (role) {
                        players[role] = conn;
                        conn.send({ type: 'init', role: role });
                        if (players.p1 && players.p2) {
                            menuAudio.pause(); // Lagu mati saat pemain lengkap
                            startRoundSequence();
                        } else {
                            document.getElementById('status-text').innerText = "1 MORE PLAYER...";
                        }
                    }
                });
                conn.on('data', data => {
                    if (data.type === 'tap' && gameActive) {
                        score += (data.role === 'p1' ? 2 : -2);
                        updateDisplay();
                    }
                });
                conn.on('close', () => location.reload());
            });
        }

        function startRoundSequence() {
            gameActive = false;
            score = 50;
            updateDisplay();
            document.getElementById('track').style.display = 'none';
            document.getElementById('status-text').innerText = "ROUND " + currentRound;
            document.getElementById('round-info').innerText = `ROUND ${currentRound} - P1: ${p1Wins} | P2: ${p2Wins}`;
            
            speak("Round " + currentRound, () => {
                setTimeout(() => {
                    speak("Ready", () => {
                        setTimeout(() => {
                            speak("Go");
                            playTrumpet();
                            document.getElementById('status-text').innerText = "FIGHT!";
                            document.getElementById('track').style.display = 'flex';
                            gameActive = true;
                            playMusic('battle');
                        }, 1000);
                    });
                }, 1000);
            });
        }

        function updateDisplay() {
            document.getElementById('bar-p1').style.width = score + '%';
            document.getElementById('bar-p2').style.width = (100 - score) + '%';

            if (score >= 100 || score <= 0) {
                gameActive = false;
                battleAudio.pause();
                let winner = score >= 100 ? "p1" : "p2";
                let loser = winner === "p1" ? "p2" : "p1";
                winner === "p1" ? p1Wins++ : p2Wins++;

                players[loser].send({ type: 'punish' });
                speak("Winner is Player " + (winner === "p1" ? "one" : "two"));

                if (p1Wins === 2 || p2Wins === 2) {
                    setTimeout(() => {
                        alert(`GAME OVER! PLAYER ${p1Wins === 2 ? '1' : '2'} IS THE CHAMPION!`);
                        location.reload();
                    }, 2000);
                } else {
                    currentRound++;
                    setTimeout(startRoundSequence, 3000);
                }
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initController() {
            const id = document.getElementById('join-id').value.trim().toUpperCase();
            if (id.length < 5) return alert("KODE SALAH!");
            showScreen('controller-screen');
            
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(id, { reliable: true });
                conn.on('open', () => {
                    conn.on('data', data => {
                        const btn = document.getElementById('btn-tap');
                        if (data.type === 'init') {
                            btn.disabled = false; btn.innerText = "TAP!";
                            btn.style.background = data.role === 'p1' ? 'var(--p1)' : 'var(--p2)';
                            btn.onpointerdown = (e) => {
                                e.preventDefault();
                                initAudio();
                                conn.send({ type: 'tap', role: data.role });
                                if(navigator.vibrate) navigator.vibrate(40);
                            };
                        }
                        if (data.type === 'punish' && navigator.vibrate) {
                            navigator.vibrate([1000, 200, 1000]); 
                        }
                    });
                });
                conn.on('close', () => location.reload());
            });
        }
    </script>
</body>
</html>
