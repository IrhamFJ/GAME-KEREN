<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLOCKY DRIFT: ONLINE</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏎️</text></svg>">
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        :root { --city-sky: #87CEEB; --action-red: #d32f2f; --action-green: #388e3c; --nitro-blue: #00d4ff; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; outline: none; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* UI MENU */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f0f0; z-index: 100; position: relative; }
        #menu h1 { 
            font-weight: 900; font-size: 2.8rem; margin: 0;
            background: linear-gradient(45deg, #ff0000, #00d4ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 5px; text-align: center;
        }
        .btn { padding: 15px 35px; border: 2px solid #222; background: white; cursor: pointer; font-weight: bold; margin: 10px; width: 260px; border-radius: 8px; text-transform: uppercase; font-family: 'Orbitron', sans-serif; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: #eee; }
        
        /* HOST UI */
        #ui-overlay { position: absolute; top: 20px; right: 20px; z-index: 1000; display: none; }
        .kode-box { background: white; padding: 12px 25px; border: 2px solid #222; border-radius: 12px; font-family: monospace; font-size: 1.4rem; font-weight: bold; box-shadow: 4px 4px 0 rgba(0,0,0,0.1); }
        #host-waiting-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; z-index: 5; pointer-events: none; }
        .radar { width: 100px; height: 100px; border: 4px solid #fff; border-radius: 50%; position: relative; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } }
        .waiting-text { margin-top: 20px; font-weight: 900; color: #fff; letter-spacing: 3px; }

        /* CONTROLLER */
        #ctrl-view { display: none; height: 100vh; width: 100vw; background: #eee; position: relative; }
        .steer-group { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 20px; }
        .arrow-btn { width: 100px; height: 100px; background: white; border: 3px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; box-shadow: 0 5px 0 #bbb; }
        .pedal-group { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .pedal { width: 90px; background: white; border: 4px solid #ccc; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .pedal-gas { height: 160px; border-color: var(--action-green); color: var(--action-green); }
        .pedal-brake { height: 100px; border-color: var(--action-red); color: var(--action-red); }
        .extra-group { position: absolute; top: 30px; left: 30px; display: flex; gap: 15px; }
        .special-btn { width: 85px; height: 85px; background: #333; color: white; border-radius: 15px; border: 3px solid #555; font-weight: bold; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; text-align: center; }
        .btn-nitro { background: #0088ff; border-color: var(--nitro-blue); }
        .btn-horn { background: #ffaa00; border-color: #ffcc00; }
        .cooldown { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        .active-btn { background: #ddd !important; transform: translateY(4px); box-shadow: none !important; }
        #target-id { padding: 15px; text-align: center; border: 2px solid #ccc; width: 260px; font-size: 1.4rem; border-radius: 12px; margin-bottom: 20px; font-family: 'Orbitron', sans-serif; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>BLOCKY DRIFT</h1>
        <p style="color:#666; letter-spacing: 2px; margin-bottom: 25px;">MULTIPLAYER ONLINE V4.3</p>
        <button class="btn" onclick="preStart('screen')">HOST CITY (PC)</button>
        <button class="btn" style="color:var(--action-red); border-color:var(--action-red);" onclick="preStart('controller')">JOIN DRIVE (HP)</button>
    </div>

    <div id="host-waiting-ui">
        <div class="radar"></div>
        <div class="waiting-text">MENCARI DRIVER...</div>
    </div>

    <div id="ui-overlay"><div class="kode-box">KODE: <span id="peer-id-text">...</span></div></div>

    <div id="ctrl-view">
        <div id="setup-ui" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center;">
            <input type="text" id="target-id" placeholder="KODE HOST">
            <button class="btn" style="border-color: var(--action-green); color: var(--action-green);" onclick="connectToServer()">NYALAKAN MESIN</button>
        </div>
        <div id="game-pad" style="display: none; width: 100%; height: 100%;">
            <div class="extra-group">
                <div class="special-btn btn-nitro" id="btn-nitro">NITRO<br>(5s)</div>
                <div class="special-btn btn-horn" id="btn-horn">HORN</div>
            </div>
            <div class="steer-group"><div class="arrow-btn" id="btn-left">←</div><div class="arrow-btn" id="btn-right">→</div></div>
            <div class="pedal-group"><div class="pedal pedal-gas" id="btn-up">GAS</div><div class="pedal pedal-brake" id="btn-down">REM</div></div>
        </div>
    </div>

    <script>
        let players = [], scene, renderer, peer;
        let keys = { up: false, down: false, left: false, right: false, nitro: false, horn: false };
        const myCustomId = 'HAM-' + Math.floor(10000 + Math.random() * 90000);
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // --- AUDIO ENGINE ---
        function createEngineSound(p) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(35, audioCtx.currentTime);
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(400, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
            p.audio = { osc, gain };
        }

        function playHorn() {
            const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        // --- WORLD & CAR ---
        function createCar(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.6, 3), new THREE.MeshStandardMaterial({ color, roughness: 0.4 }));
            body.position.y = 0.6; body.castShadow = true; g.add(body);
            const glass = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            glass.position.set(0, 1.1, 0.1); g.add(glass);
            [[-0.8, 1], [0.8, 1], [-0.8, -1], [0.8, -1]].forEach(p => {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.3, 12), new THREE.MeshStandardMaterial({color: 0x111}));
                w.rotation.z = Math.PI/2; w.position.set(p[0], 0.4, p[1]); g.add(w);
            });
            const fire = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.4, 1.8, 8), new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.7 }));
            fire.rotation.x = Math.PI/2; fire.position.set(0, 0.5, 1.8); fire.visible = false;
            g.add(fire); g.userData.nitroFire = fire;
            return g;
        }

        function initWorld() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 60, 550);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.3); sun.position.set(50, 100, 50); sun.castShadow = true; scene.add(sun);
            
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);
            const grid = new THREE.GridHelper(5000, 200, 0x444444, 0x555555); grid.position.y = 0.02; scene.add(grid);

            for(let i=0; i<450; i++) {
                const h = Math.random()*45 + 10;
                const b = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0x666666 + Math.random()*0x333333 }));
                b.scale.set(Math.random()*6+8, h, Math.random()*6+8);
                let px = (Math.random()-0.5)*1200, pz = (Math.random()-0.5)*1200;
                if(Math.abs(px) < 35) px += 45;
                b.position.set(px, h/2, pz); b.castShadow = true; scene.add(b);
            }

            peer.on('connection', conn => {
                if(players.length >= 2) return;
                document.getElementById('host-waiting-ui').style.display = 'none';
                const pID = (players.length === 0) ? 1 : (players[0].id === 1 ? 2 : 1);
                const p = { conn, id: pID, input: { up:0, down:0, left:0, right:0, nitro:0, horn:0 }, car: createCar(pID===1?0xd32f2f:0xffffff), cam: new THREE.PerspectiveCamera(75, 1, 0.1, 1000), speed: 0, rot: 0, nitroCooldown: false, nitroActive: false };
                createEngineSound(p);
                p.car.position.set(pID === 1 ? 7 : -7, 0, 0); scene.add(p.car); players.push(p);
                conn.on('data', d => p.input = d);
                const close = () => { if(p.audio) { p.audio.osc.stop(); p.audio.osc.disconnect(); } scene.remove(p.car); players = players.filter(x => x.id !== p.id); if(players.length === 0) document.getElementById('host-waiting-ui').style.display = 'flex'; };
                conn.on('close', close); conn.on('error', close);
                if(players.length === 1) animate();
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const w = window.innerWidth, h = window.innerHeight;
            const isSplit = players.length > 1;

            players.forEach((p, i) => {
                // Skills Logic
                if(p.input.horn && !p.hornActive) { playHorn(); p.hornActive = true; setTimeout(() => p.hornActive = false, 600); }
                if(p.input.nitro && !p.nitroCooldown && !p.nitroActive) {
                    p.nitroActive = true; p.nitroCooldown = true; p.car.userData.nitroFire.visible = true;
                    setTimeout(() => { p.nitroActive = false; p.car.userData.nitroFire.visible = false; }, 5000);
                    setTimeout(() => { p.nitroCooldown = false; }, 15000);
                }

                // Speed & Steering
                let speedMult = p.nitroActive ? 2.3 : 1.0;
                let target = p.input.up ? (1.3 * speedMult) : (p.input.down ? -0.7 : 0);
                p.speed = THREE.MathUtils.lerp(p.speed, target, 0.08);

                if(Math.abs(p.speed) > 0.1) {
                    const turnDir = p.speed > 0 ? 1 : -1;
                    if(p.input.left) p.rot += 0.045 * turnDir;
                    if(p.input.right) p.rot -= 0.045 * turnDir;
                }
                p.car.rotation.y = p.rot;

                // Physics Check
                const oldPos = p.car.position.clone();
                p.car.translateZ(-p.speed);
                
                let hit = false;
                scene.children.forEach(obj => {
                    if(obj.isMesh && obj.geometry.type === "BoxGeometry" && obj !== p.car) {
                        if(new THREE.Box3().setFromObject(p.car).intersectsBox(new THREE.Box3().setFromObject(obj))) hit = true;
                    }
                });
                players.forEach(other => {
                    if(other.id !== p.id && p.car.position.distanceTo(other.car.position) < 2.9) {
                        hit = true; other.speed += p.speed * 0.8;
                    }
                });

                if(hit) { 
                    p.car.position.copy(oldPos); p.speed = -p.speed * 0.4; 
                    if(p.conn && !p.isVib) { p.conn.send({type:'vibrate'}); p.isVib = true; setTimeout(()=>p.isVib=false, 500); }
                }

                // Audio & Visual Effects
                if(p.audio) {
                    p.audio.osc.frequency.setTargetAtTime(35 + (Math.abs(p.speed)*85), audioCtx.currentTime, 0.1);
                    p.audio.gain.gain.setTargetAtTime(0.08 + (Math.abs(p.speed)*0.2), audioCtx.currentTime, 0.1);
                }
                if(p.nitroActive) {
                    p.car.userData.nitroFire.scale.set(1, 1.2 + Math.random(), 1);
                    p.car.userData.nitroFire.material.color.setHex(Math.random() > 0.5 ? 0x00ffff : 0xffffff);
                }

                // Render Setup
                p.cam.aspect = isSplit ? w/(h/2) : w/h; p.cam.updateProjectionMatrix();
                const camPos = new THREE.Vector3(0, 5, 14).applyMatrix4(p.car.matrixWorld);
                p.cam.position.lerp(camPos, 0.15); p.cam.lookAt(p.car.position);

                if(isSplit) {
                    renderer.setScissorTest(true);
                    const rect = i === 0 ? [0, h/2, w, h/2] : [0, 0, w, h/2];
                    renderer.setViewport(...rect); renderer.setScissor(...rect);
                } else {
                    renderer.setScissorTest(false); renderer.setViewport(0, 0, w, h);
                }
                renderer.render(scene, p.cam);
            });
        }

        function preStart(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
            document.getElementById('menu').style.display = 'none';
            peer = new Peer(myCustomId);
            if(type === 'screen') {
                document.getElementById('ui-overlay').style.display = 'block';
                document.getElementById('peer-id-text').innerText = myCustomId;
                document.getElementById('host-waiting-ui').style.display = 'flex';
                initWorld();
            } else {
                document.getElementById('ctrl-view').style.display = 'block';
                setupMobileControls();
            }
        }

        window.addEventListener('resize', () => { renderer.setSize(window.innerWidth, window.innerHeight); });

        function setupMobileControls() {
            const bind = (id, k) => {
                const el = document.getElementById(id);
                el.addEventListener('touchstart', (e) => { 
                    e.preventDefault(); keys[k] = true; el.classList.add('active-btn');
                    if(k === 'nitro' && !el.classList.contains('cooldown')) {
                        el.classList.add('cooldown');
                        let cd = 15; let t = setInterval(() => { cd--; el.innerText = cd + "s"; if(cd <= 0) { clearInterval(t); el.classList.remove('cooldown'); el.innerHTML = "NITRO<br>(5s)"; } }, 1000);
                    }
                    if(window.currentConn) window.currentConn.send(keys);
                    if(navigator.vibrate) navigator.vibrate(25);
                });
                el.addEventListener('touchend', (e) => { e.preventDefault(); keys[k] = false; el.classList.remove('active-btn'); if(window.currentConn) window.currentConn.send(keys); });
            };
            ['up','down','left','right','nitro','horn'].forEach(k => bind('btn-'+k, k));
        }

        function connectToServer() {
            const id = document.getElementById('target-id').value.toUpperCase().trim();
            if(!id) return;
            const conn = peer.connect(id);
            conn.on('open', () => { window.currentConn = conn; document.getElementById('setup-ui').style.display='none'; document.getElementById('game-pad').style.display='block'; });
            conn.on('data', d => { if(d.type === 'vibrate' && navigator.vibrate) navigator.vibrate(80); });
        }
    </script>
</body>
</html>
