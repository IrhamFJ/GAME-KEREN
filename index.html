<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABC 5 DASAR - 2 MODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');

        :root {
            --bg-main: #f0f4f8;
            --primary: #4a90e2;
            --accent: #ffcc00;
            --text-dark: #2c3e50;
            --white: #ffffff;
            --success: #4cd137;
            --danger: #e84118;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0;
            font-family: 'Fredoka', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(#d1d9e6 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .game-card {
            width: 90%; max-width: 550px;
            background: var(--white);
            border-radius: 40px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), inset 0 -8px 0 rgba(0,0,0,0.05);
            border: 4px solid var(--white);
            position: relative; text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes bounceIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 { font-weight: 700; font-size: 2rem; color: var(--primary); margin-bottom: 20px; }

        .btn {
            width: 100%; padding: 18px; margin-bottom: 15px;
            border-radius: 25px; border: none; font-size: 1.1rem;
            font-weight: 600; cursor: pointer; transition: 0.2s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }

        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        .btn-primary:disabled { background: #dcdde1; color: #7f8c8d; box-shadow: none; transform: none; cursor: not-allowed; }

        .btn-yellow { background: var(--accent); color: #856404; }
        .btn-yellow:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        
        input {
            width: 100%; padding: 18px; background: #f8f9fa;
            border: 3px solid #e9ecef; border-radius: 20px;
            color: var(--text-dark); font-size: 1.1rem;
            text-align: center; margin-bottom: 20px; outline: none;
        }

        .log-panel {
            width: 100%; height: 110px; background: #f1f2f6;
            border-radius: 20px; padding: 15px; font-size: 0.85rem;
            color: #57606f; text-align: left; overflow-y: auto;
            margin-bottom: 15px; border: 2px solid #dfe4ea;
        }

        .finger-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            margin: 15px 0; 
            width: 100%;
        }

        .f-box {
            aspect-ratio: 1/1; background: #f1f2f6;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; border: 3px solid transparent; transition: 0.2s;
            font-weight: 700; color: #a4b0be; font-size: 1.2rem;
        }
        .f-box.selected { 
            border-color: var(--primary); 
            background: var(--primary); 
            color: var(--white); 
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }

        .progress-track { width: 100%; height: 12px; background: #f1f2f6; border-radius: 10px; margin: 25px 0; overflow: hidden; }
        #t-fill { width: 100%; height: 100%; background: var(--primary); border-radius: 10px; transition: 1s linear; }

        .char-hero { font-size: 8rem; font-weight: 700; color: var(--primary); margin: 5px 0; }
        .badge { display: inline-block; padding: 5px 15px; border-radius: 10px; background: #eaf2ff; color: var(--primary); font-size: 0.8rem; font-weight: 600; margin-bottom: 10px; }

        .sentil-alert { background: #ffdada !important; border-color: #e84118 !important; }
    </style>
</head>
<body>

    <div class="game-card" id="card-wrap">
        <div id="scr-start" class="screen active">
            <div class="badge">CLASSIC BATTLE</div>
            <h1>ABC 5 Dasar</h1>
            <button class="btn btn-primary" onclick="initGame('MONITOR')">🖥️ Monitor (TV)</button>
            <button class="btn btn-yellow" onclick="initGame('CONTROL')">📱 Controller (HP)</button>
        </div>

        <div id="scr-mon-room" class="screen">
            <div class="badge" style="background:var(--accent); color:#856404;">GAME LOBBY</div>
            <h1>ROOM ID: <span id="id-teks" style="color:var(--primary)">--------</span></h1>
            <div class="log-panel" id="log-list">System Ready... Waiting for players.</div>
            <p style="margin-bottom: 15px; font-weight: 600;" id="txt-count">PLAYERS: 0/2</p>
            <button class="btn btn-primary" id="btn-gas" disabled onclick="startFlow()">START BATTLE</button>
        </div>

        <div id="scr-con-masuk" class="screen">
            <h1>Nickname?</h1>
            <input type="text" id="nama-input" placeholder="Enter nickname..." maxlength="12" spellcheck="false">
            <button class="btn btn-primary" onclick="joinGame()">Ready to Play!</button>
        </div>

        <div id="scr-jari" class="screen">
            <div class="badge">ROUND 1</div>
            <h1>Set Your Fingers!</h1>
            <div class="finger-grid" id="f-container"></div>
            <button class="btn btn-primary" onclick="submitJari()">Confirm!</button>
        </div>

        <div id="scr-tebak" class="screen">
            <div class="char-hero" id="huruf-hero">?</div>
            <div id="wrap-input" style="width:100%">
                <input type="text" id="jawaban-in" placeholder="Type fast..." autocomplete="off" spellcheck="false">
            </div>
            <div class="progress-track"><div id="t-fill"></div></div>
            <p id="info-teks" style="font-weight: 600;">HURRY UP!</p>
        </div>
    </div>

    <script>
        let mode = ""; let roomID = ""; let playerList = []; 
        let nickName = ""; let fingerData = new Set(); let targetChar = ""; let gameTimer = null;

        const fCont = document.getElementById('f-container');
        for(let i=1; i<=10; i++) {
            const div = document.createElement('div');
            div.className = 'f-box';
            div.id = 'x' + i;
            div.innerText = i;
            div.onclick = () => tapJari('x'+i);
            fCont.appendChild(div);
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function initGame(m) {
            mode = m;
            if(m === 'MONITOR') {
                roomID = Math.floor(10000000 + Math.random() * 90000000);
                document.getElementById('id-teks').innerText = roomID;
                nav('scr-mon-room');
            } else {
                let checkID = prompt("ENTER 8-DIGIT ROOM ID:");
                if(checkID && checkID.length === 8) { roomID = checkID; nav('scr-con-masuk'); }
                else { alert("INVALID ROOM ID!"); }
            }
        }

        function writeLog(msg) {
            const l = document.getElementById('log-list');
            if(l) { l.innerHTML += `<br>> ${msg}`; l.scrollTop = l.scrollHeight; }
        }

        function joinGame() {
            let n = document.getElementById('nama-input').value.trim().toUpperCase();
            if(!n) return;
            nickName = n;
            if(mode === 'CONTROL') {
                playerList.push(nickName);
                nav('scr-jari');
                refreshLobby(); // Simulasi local
            }
        }

        function refreshLobby() {
            const c = document.getElementById('txt-count');
            const b = document.getElementById('btn-gas');
            if(c) c.innerText = `PLAYERS: ${playerList.length}/2`;
            writeLog(`Player ${nickName} connected.`);
            if(playerList.length >= 1 && b) { 
                b.disabled = false; 
                writeLog("Ready to Battle?"); 
            }
        }

        function tapJari(id) {
            const el = document.getElementById(id);
            if(fingerData.has(id)) { fingerData.delete(id); el.classList.remove('selected'); }
            else { fingerData.add(id); el.classList.add('selected'); }
        }

        function startFlow() {
            nav('scr-tebak'); 
            goBattle();
        }

        function submitJari() {
            if(fingerData.size === 0) return alert("Pick fingers!");
            nav('scr-tebak');
            goBattle();
        }

        function goBattle() {
            if(gameTimer) clearInterval(gameTimer);
            const bank = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            targetChar = bank[Math.floor(Math.random() * 26)];
            document.getElementById('huruf-hero').innerText = targetChar;
            
            if(mode === 'MONITOR') {
                document.getElementById('wrap-input').style.display = 'none';
                writeLog(`Battle Start! Key: ${targetChar}`);
            }

            let tick = 30;
            const bar = document.getElementById('t-fill');
            bar.style.transition = 'none';
            bar.style.width = "100%";
            
            // Fix: Double RAF to ensure transition reset
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    bar.style.transition = '1s linear';
                    gameTimer = setInterval(() => {
                        tick--;
                        bar.style.width = (tick/30)*100 + "%";
                        if(tick <= 0) { clearInterval(gameTimer); resolve(false); }
                    }, 1000);
                });
            });
        }

        function resolve(win) {
            if(gameTimer) clearInterval(gameTimer);
            const status = document.getElementById('info-teks');
            if(!win) {
                document.getElementById('card-wrap').classList.add('sentil-alert');
                status.innerText = "TIME OUT! SENTIL TIME!! 💀";
                status.style.color = "#e84118";
            } else {
                status.innerText = "NICE! YOU ARE SAFE! ✨";
                status.style.color = "#4cd137";
            }
        }

        document.getElementById('jawaban-in').addEventListener('keypress', async function(e) {
            if(e.key === 'Enter') {
                e.preventDefault(); // Fix: Prevent form submission/refresh
                const ans = this.value.trim().toUpperCase();
                if(!ans || ans[0] !== targetChar) { alert("Wrong Initial!"); return; }
                
                if(gameTimer) clearInterval(gameTimer);
                this.disabled = true;
                document.getElementById('info-teks').innerText = "Analyzing... 🧐";

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3500);

                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${ans}&format=json&limit=1`, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    const d = await r.json();
                    if(d.length > 0) { resolve(true); } 
                    else { 
                        document.getElementById('info-teks').innerText = "NOT FOUND! ❌";
                        this.disabled = false;
                        resolve(false); 
                    }
                } catch(err) {
                    resolve(true); 
                }
            }
        });
    </script>
</body>
</html>
