<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IRHAM FAJRI GTA V2.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --red: #b30000; --active: #ff0000; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Arial Black', sans-serif; background: #000; overflow: hidden; touch-action: none; color: #fff; width: 100vw; height: 100vh; }
        
        /* MENU & UI */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; z-index: 100; position: relative; background: #000; }
        .title { font-size: 3.5rem; color: #ff0000; text-shadow: 4px 4px #fff; font-style: italic; margin-bottom: 30px; text-align: center; }
        .btn-main { padding: 15px 50px; border: 4px solid #fff; background: transparent; color: #fff; font-weight: 900; border-radius: 15px; cursor: pointer; font-size: 1.2rem; text-transform: uppercase; margin: 10px; }

        #ui-overlay { position: absolute; top: 10px; left: 10px; z-index: 50; display: none; }
        .kode-box { background: rgba(0,0,0,0.8); color: #00ff00; padding: 10px; border: 2px solid #00ff00; font-family: monospace; font-size: 1.5rem; }

        /* --- CONTROLLER (HP) --- */
        #ctrl-view { display: none; width: 100vw; height: 100vh; background: #050505; position: fixed; top: 0; left: 0; z-index: 9999; }
        #setup-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 10001; }
        #target-id { padding: 15px; text-align: center; background: #222; color: #fff; border: 2px solid #444; width: 250px; font-size: 1.5rem; border-radius: 10px; margin-bottom: 15px; }

        #game-pad { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 10000; }
        
        /* Tombol Gede Sesuai Gambar */
        .gp-btn { position: absolute; background: var(--red); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 3px solid #500; z-index: 10002; font-size: 1.2rem; box-shadow: 0 4px 0 #300; }
        .active-btn { background: var(--active) !important; box-shadow: none; transform: translateY(4px) scale(0.95); }

        /* L-Side */
        #btn-lt { width: 110px; height: 65px; top: 15px; left: 15px; border-radius: 15px; }
        #btn-lb { width: 90px; height: 55px; top: 90px; left: 15px; border-radius: 12px; }
        #l-stick { position: absolute; bottom: 25px; left: 35px; width: 170px; height: 170px; background: #1a1a1a; border-radius: 50%; border: 4px solid #333; }
        
        /* R-Side */
        #btn-rt { width: 110px; height: 65px; top: 15px; right: 15px; border-radius: 15px; }
        #btn-rb { width: 90px; height: 55px; top: 90px; right: 15px; border-radius: 12px; }
        .face-grid { position: absolute; top: 45px; right: 135px; display: grid; grid-template-areas: ". Y ." "X . B" ". A ."; gap: 12px; }
        .f-btn { width: 60px; height: 60px; position: static; font-size: 1.4rem; box-shadow: 0 4px 0 #300; }
        #r-stick { position: absolute; bottom: 25px; right: 35px; width: 170px; height: 170px; background: #1a1a1a; border-radius: 50%; border: 4px solid #333; }
        
        .stick-head { position: absolute; top: 25%; left: 25%; width: 50%; height: 50%; background: #ddd; border-radius: 50%; border: 5px solid #fff; box-shadow: 0 8px 15px #000; pointer-events: none; }
        
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 class="title">IRHAM FAJRI<br>GTA V2.0</h1>
        <button class="btn-main" onclick="preStart('screen')">HOST TV</button>
        <button class="btn-main" style="color:#ff0000; border-color:#ff0000;" onclick="preStart('controller')">JOIN HP</button>
    </div>

    <div id="ui-overlay"><div class="kode-box">TV ID: <span id="peer-id-text">...</span></div></div>

    <div id="ctrl-view">
        <div id="setup-ui">
            <input type="text" id="target-id" placeholder="KODE TV">
            <button class="btn-main" onclick="connectToServer()">CONNECT</button>
        </div>
        <div id="game-pad">
            <div class="gp-btn" id="btn-lt">LT</div><div class="gp-btn" id="btn-lb">LB</div>
            <div class="gp-btn" id="btn-rt">RT</div><div class="gp-btn" id="btn-rb">RB</div>
            <div class="face-grid">
                <div class="gp-btn f-btn" id="btn-y" style="color:#ffeb3b; grid-area:Y">Y</div>
                <div class="gp-btn f-btn" id="btn-x" style="color:#2196f3; grid-area:X">X</div>
                <div class="gp-btn f-btn" id="btn-b" style="color:#f44336; grid-area:B">B</div>
                <div class="gp-btn f-btn" id="btn-a" style="color:#4caf50; grid-area:A">A</div>
            </div>
            <div id="l-stick"><div class="stick-head" id="l-head"></div></div>
            <div id="r-stick"><div class="stick-head" id="r-head"></div></div>
        </div>
    </div>

    <script>
        let players = [], vehicles = [], scene, renderer, peer, clock;
        let cState = { lX:0, lY:0, rX:0, rY:0, A:0, B:0, X:0, Y:0, RT:0, LT:0 };
        const myID = 'GTA-' + Math.floor(1000 + Math.random() * 9000);

        function full() {
            const d = document.documentElement;
            if (d.requestFullscreen) d.requestFullscreen();
            else if (d.webkitRequestFullscreen) d.webkitRequestFullscreen();
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock("landscape").catch(()=>{});
        }

        function preStart(type) {
            document.getElementById('menu').style.display = 'none';
            if(type === 'screen') {
                full();
                peer = new Peer(myID);
                document.getElementById('ui-overlay').style.display = 'block';
                document.getElementById('peer-id-text').innerText = myID;
                initWorld();
            } else {
                document.getElementById('ctrl-view').style.display = 'block';
                peer = new Peer();
            }
        }

        // --- WORLD LOGIC (TV) ---
        function initWorld() {
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 150);
            
            renderer = new THREE.WebGLRenderer({ antialias: false, precision: "lowp" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 5); scene.add(light);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshLambertMaterial({color: 0x333333}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);
            scene.add(new THREE.GridHelper(1000, 50, 0, 0x444444));

            // Spawn Mobil
            for(let i=0; i<6; i++) {
                const g = new THREE.Group();
                const b = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), new THREE.MeshLambertMaterial({color: Math.random()*0xffffff}));
                b.position.y = 0.6; g.add(b);
                const car = { mesh: g, driver: null, speed: 0 };
                g.position.set((Math.random()-0.5)*80, 0, (Math.random()-0.5)*80);
                scene.add(g); vehicles.push(car);
            }

            peer.on('connection', conn => {
                const pID = players.length + 1;
                const g = new THREE.Group();
                const b = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.8, 2, 8), new THREE.MeshLambertMaterial({color: pID==1?0x007bff:0xff3333}));
                b.position.y = 1; g.add(b);
                
                const p = { conn, mesh: g, cam: new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 200), input: {...cState}, v: null, walk: 0 };
                g.position.set(pID==1?5:-5, 0, 10); scene.add(g); players.push(p);
                conn.on('data', d => p.input = d);
                if(players.length === 1) { clock = new THREE.Clock(); animate(); }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const split = players.length > 1;

            vehicles.forEach(v => {
                if(v.driver) {
                    const inp = v.driver.input;
                    v.speed += (inp.RT - inp.LT*1.5) * 18 * dt;
                    v.speed = THREE.MathUtils.clamp(v.speed, -10, 45);
                    v.speed *= 0.98;
                    if(Math.abs(v.speed) > 1) v.mesh.rotation.y -= inp.lX * 2 * dt * (v.speed > 0 ? 1 : -1);
                    v.mesh.translateZ(v.speed * dt);
                } else { v.speed *= 0.95; v.mesh.translateZ(v.speed * dt); }
            });

            players.forEach((p, i) => {
                const inp = p.input;
                if(!p.v) {
                    const move = new THREE.Vector3(inp.lX, 0, -inp.lY).applyEuler(p.mesh.rotation);
                    p.mesh.position.add(move.multiplyScalar(8 * dt));
                    p.mesh.rotation.y -= inp.rX * 2.5 * dt;
                    if(inp.lX || inp.lY) { p.walk += dt*12; p.mesh.position.y = Math.abs(Math.sin(p.walk))*0.15; }
                    const off = new THREE.Vector3(0, 4.5, -9).applyMatrix4(p.mesh.matrixWorld);
                    p.cam.position.lerp(off, 0.2);
                    p.cam.lookAt(p.mesh.position.x, p.mesh.position.y + 1.5, p.mesh.position.z);
                    if(inp.Y) {
                        inp.Y = 0;
                        vehicles.forEach(v => { if(!v.driver && p.mesh.position.distanceTo(v.mesh.position) < 5) { p.v = v; v.driver = p; p.mesh.visible = false; }});
                    }
                } else {
                    p.mesh.position.copy(p.v.mesh.position);
                    p.cam.position.copy(p.v.mesh.position).add(new THREE.Vector3(0, 1.5, 0));
                    p.cam.lookAt(p.v.mesh.position.clone().add(new THREE.Vector3(0, 0, 10).applyEuler(p.v.mesh.rotation)));
                    if(inp.Y) { inp.Y = 0; p.mesh.position.add(new THREE.Vector3(-3,0,0).applyEuler(p.v.mesh.rotation)); p.mesh.visible = true; p.v.driver = null; p.v = null; }
                }
                const w = window.innerWidth, h = window.innerHeight;
                p.cam.aspect = split ? w/(h/2) : w/h; p.cam.updateProjectionMatrix();
                if(split) {
                    renderer.setScissorTest(true);
                    const rect = i==0 ? [0, h/2, w, h/2] : [0, 0, w, h/2];
                    renderer.setViewport(...rect); renderer.setScissor(...rect);
                } else { renderer.setScissorTest(false); renderer.setViewport(0,0,w,h); }
                renderer.render(scene, p.cam);
            });
        }

        // --- CONTROLLER LOGIC (HP) ---
        function setupControls() {
            const send = () => { if(window.conn) window.conn.send(cState); };
            
            const bindStick = (id, headId, prefix) => {
                const el = document.getElementById(id), head = document.getElementById(headId);
                const move = (e) => {
                    const t = e.touches[0], r = el.getBoundingClientRect(), rad = el.offsetWidth/2;
                    let dx = t.clientX - (r.left + rad), dy = t.clientY - (r.top + rad);
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if(d > rad) { dx *= rad/d; dy *= rad/d; }
                    head.style.transform = `translate(${dx}px, ${dy}px)`;
                    cState[prefix+'X'] = dx/rad; cState[prefix+'Y'] = dy/rad; send();
                };
                el.addEventListener('touchstart', e => { e.preventDefault(); move(e); }, {passive:false});
                el.addEventListener('touchmove', e => { e.preventDefault(); move(e); }, {passive:false});
                el.addEventListener('touchend', () => { head.style.transform = 'translate(0,0)'; cState[prefix+'X']=0; cState[prefix+'Y']=0; send(); });
            };

            bindStick('l-stick', 'l-head', 'l');
            bindStick('r-stick', 'r-head', 'r');

            ['a','b','x','y','lt','lb','rt','rb'].forEach(id => {
                const el = document.getElementById('btn-'+id);
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault(); 
                    el.classList.add('active-btn'); 
                    cState[id.toUpperCase()]=1; 
                    send(); 
                    if(navigator.vibrate) navigator.vibrate(25);
                }, {passive:false});
                el.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    el.classList.remove('active-btn'); 
                    cState[id.toUpperCase()]=0; 
                    send();
                }, {passive:false});
            });
        }

        function connectToServer() {
            const id = document.getElementById('target-id').value.toUpperCase().trim();
            if(!id) return;
            full();
            window.conn = peer.connect(id);
            window.conn.on('open', () => { 
                document.getElementById('setup-ui').style.display='none'; 
                document.getElementById('game-pad').style.display='block'; 
                setupControls(); // Panggil setup setelah game-pad muncul
            });
        }
    </script>
</body>
</html>
