<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLOCK DRIFT V1.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; touch-action: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* UI MENU */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(45deg, #111, #222); color: #fff; text-align: center; position: relative; z-index: 10; }
        .btn { padding: 20px; width: 280px; margin: 12px; font-weight: bold; cursor: pointer; border: 4px solid #fff; background: transparent; color: #fff; font-family: 'Orbitron'; text-transform: uppercase; transition: 0.1s; }
        .btn:active { background: #fff; color: #000; transform: scale(0.95); }

        /* HP CONTROLLER */
        #ctrl-view { display: none; height: 100vh; width: 100vw; background: #050505; position: relative; }
        #dash { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #000; border: 5px solid #444; padding: 15px; text-align: center; border-radius: 20px; width: 220px; box-shadow: 0 10px 0 #222; }
        #spd { color: #fff; font-size: 3.5rem; display: block; line-height: 1; }
        #gear-ui { background: #00ff44; color: #000; font-size: 2rem; padding: 5px 25px; margin-top: 10px; display: inline-block; border-radius: 8px; font-weight: 900; }
        .redline { background: #ff0000 !important; color: #fff !important; animation: blink 0.1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* BUTTONS POSITIONING */
        .pedal-group { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .pedal { width: 115px; border: 5px solid #000; border-radius: 15px; font-weight: 900; color: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 0 #000; }
        .gas { height: 180px; background: #006400; font-size: 1.5rem; }
        .rem { height: 100px; background: #8b0000; font-size: 1.2rem; }
        .steer-group { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 20px; }
        .btn-s { width: 105px; height: 105px; background: #222; color: #fff; border-radius: 50%; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; border: 5px solid #444; box-shadow: 0 6px 0 #000; }
        .gear-group { position: absolute; top: 55%; left: 30px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; }
        .g-btn { width: 85px; height: 85px; background: #000; color: #fff; border: 4px solid #333; font-size: 2.2rem; display: flex; align-items: center; justify-content: center; font-weight: 900; border-radius: 12px; }
        .active { filter: brightness(2.5); transform: translateY(6px); box-shadow: none !important; }
        
        #host-id-box { position: absolute; top: 15px; right: 15px; background: #fff; color: #000; padding: 10px 20px; border-radius: 8px; font-weight: 900; display: none; border: 3px solid #000; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 3rem; margin: 0; letter-spacing: 5px;">BLOCK DRIFT</h1>
    <p style="color: #00ff44; margin-bottom: 30px; letter-spacing: 2px;">V1.0 STABLE</p>
    <button class="btn" onclick="start('host')">HOST (LAPTOP)</button>
    <button class="btn" onclick="start('ctrl')">JOIN (HP)</button>
</div>

<div id="host-id-box">KODE: <span id="id-val">...</span></div>

<div id="ctrl-view">
    <div id="setup" style="padding-top: 100px; text-align: center;">
        <input type="text" id="target" placeholder="KODE HOST" maxlength="7" style="padding:18px; font-size:1.5rem; width:85%; max-width:320px; border:4px solid #fff; background:#000; color:#fff; font-family:'Orbitron'; border-radius:12px; text-align:center; text-transform:uppercase;"><br><br>
        <button class="btn" onclick="connect()">START ENGINE</button>
    </div>
    <div id="pad" style="display:none; width:100%; height:100%;">
        <div id="dash"><span id="spd">0</span><div id="gear-ui">N</div></div>
        <div class="gear-group"><div class="g-btn" id="up-g">+</div><div class="g-btn" id="down-g">-</div></div>
        <div class="steer-group"><div class="btn-s" id="l">←</div><div class="btn-s" id="r">→</div></div>
        <div class="pedal-group"><div class="pedal gas" id="u">GAS</div><div class="pedal rem" id="d">REM</div></div>
    </div>
</div>

<script>
let players=[], scene, renderer, peer, keys={u:0,d:0,l:0,r:0,g:0};
const myId = 'HAM-' + Math.floor(100+Math.random()*899);
const gearLimits = {"-1":-0.5, "0":0, "1":0.48, "2":0.85, "3":1.25, "4":1.7, "5":2.3};

function start(mode) {
    document.getElementById('menu').style.display='none';
    peer = new Peer(myId);
    peer.on('open', id => {
        if(mode==='host') {
            document.getElementById('host-id-box').style.display='block';
            document.getElementById('id-val').innerText = id;
            initGame();
        } else {
            document.getElementById('ctrl-view').style.display='block';
        }
    });
    peer.on('error', err => alert("PeerJS Error: " + err.type));
}

function initGame() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
    renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setPixelRatio(1); renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.3));
    
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(4000,4000), new THREE.MeshBasicMaterial({color:0x1a1a1a}));
    floor.rotation.x = -Math.PI/2; scene.add(floor);

    peer.on('connection', conn => {
        const p = {
            conn, speed:0, tick:0,
            car: new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.9, 3.2), new THREE.MeshBasicMaterial({color: Math.random()*0xffffff})),
            cam: new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 2000),
            input: {u:0,d:0,l:0,r:0,g:0}
        };
        scene.add(p.car); players.push(p);
        conn.on('data', d => p.input = d);
        conn.on('close', () => { scene.remove(p.car); players = players.filter(pl => pl.conn.peer !== conn.peer); });
        if(players.length === 1) loop();
    });
}

function loop() {
    requestAnimationFrame(loop);
    players.forEach((p, idx) => {
        let max = gearLimits[p.input.g.toString()] || 0;
        
        if(p.input.u && p.input.g !== 0) {
            if(p.input.g > 0) p.speed = Math.min(p.speed + 0.02, max);
            else p.speed = Math.max(p.speed - 0.02, max);
        } else { p.speed *= 0.975; }
        
        if(p.input.d) p.speed *= 0.82;
        p.car.translateZ(-p.speed);

        if(Math.abs(p.speed) > 0.05) {
            const tr = p.speed > 0 ? 1 : -1;
            if(p.input.l) p.car.rotation.y += 0.046 * tr;
            if(p.input.r) p.car.rotation.y -= 0.046 * tr;
        }

        p.tick++;
        if(p.tick % 3 === 0 && p.conn.open) {
            p.conn.send({ s: Math.floor(Math.abs(p.speed)*125), g: p.input.g, rl: (Math.abs(p.speed)/Math.abs(max||0.1)) > 0.93 });
        }

        const h = window.innerHeight;
        p.cam.aspect = window.innerWidth / (players.length > 1 ? h/2 : h);
        p.cam.updateProjectionMatrix();
        const cp = new THREE.Vector3(0, 6, 13).applyQuaternion(p.car.quaternion);
        p.cam.position.copy(p.car.position).add(cp);
        p.cam.lookAt(p.car.position);

        if(players.length > 1) {
            renderer.setScissorTest(true);
            const r = idx === 0 ? [0, h/2, window.innerWidth, h/2] : [0, 0, window.innerWidth, h/2];
            renderer.setViewport(...r); renderer.setScissor(...r);
        }
        renderer.render(scene, p.cam);
    });
}

function connect() {
    if(window.activeConn) return;
    const tid = document.getElementById('target').value.toUpperCase().trim();
    if(!tid) return alert("MASUKKIN KODE DULU!");
    
    const conn = peer.connect(tid);
    conn.on('open', () => { 
        window.activeConn = conn; 
        document.getElementById('setup').style.display='none'; 
        document.getElementById('pad').style.display='block'; 
        setupEvents(); 
    });
    conn.on('data', d => {
        document.getElementById('spd').innerText = d.s;
        let gTxt = d.g==0?'N':(d.g==-1?'R':d.g);
        const el = document.getElementById('gear-ui'); el.innerText = gTxt;
        if(d.rl && d.g !== 0) el.classList.add('redline'); else el.classList.remove('redline');
    });
}

function setupEvents() {
    const bind = (id, k) => {
        const el = document.getElementById(id);
        const go = (e) => { 
            e.preventDefault(); 
            if(k==='ug') keys.g = Math.min(keys.g+1, 5); 
            else if(k==='dg') keys.g = Math.max(keys.g-1, -1); 
            else keys[k] = 1; 
            if(window.activeConn) window.activeConn.send(keys); 
            el.classList.add('active'); 
        };
        const stop = (e) => { 
            if(k!=='ug' && k!=='dg') keys[k] = 0; 
            if(window.activeConn) window.activeConn.send(keys); 
            el.classList.remove('active'); 
        };
        el.addEventListener('touchstart', go, {passive: false});
        el.addEventListener('touchend', stop);
        el.addEventListener('mousedown', go);
        el.addEventListener('mouseup', stop);
    };
    bind('u','u'); bind('d','d'); bind('l','l'); bind('r','r'); bind('up-g','ug'); bind('down-g','dg');
}
</script>
</body>
</html>
