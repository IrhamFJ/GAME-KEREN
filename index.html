<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAM 3D SUPER SPORT - FINAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ea; --neon-green: #39ff14; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; overflow: hidden; touch-action: none; }
        
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; z-index: 100; position: relative; background: radial-gradient(circle, #111 0%, #000 100%); }
        .btn { padding: 15px 40px; border: 2px solid var(--neon-blue); color: white; background: none; cursor: pointer; letter-spacing: 3px; font-weight: bold; transition: 0.3s; margin: 10px; width: 280px; text-transform: uppercase; }
        .btn:hover { background: var(--neon-blue); box-shadow: 0 0 25px var(--neon-blue); color: #000; }
        
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 10; }
        .p-label { position: absolute; background: rgba(0,0,0,0.8); padding: 8px 15px; border: 1px solid #333; font-size: 0.9rem; font-family: monospace; }
        .id-display { top: 10px; right: 10px; color: var(--neon-blue); border: 1px solid var(--neon-blue); }

        #ctrl-view { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #050505; }
        .stier { width: 180px; height: 180px; border: 10px double #333; border-top: 10px solid var(--neon-blue); border-radius: 50%; transition: transform 0.05s linear; }
        .nitro-zone { width: 100%; height: 35%; position: absolute; bottom: 0; background: linear-gradient(transparent, rgba(0,243,255,0.05)); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--neon-blue); border-top: 1px solid #222; }

        #landscape-warn {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #900; color: white; z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        @media (orientation: portrait) {
            #ctrl-view { display: none !important; }
            #landscape-warn { display: flex; }
        }
    </style>
</head>
<body>

    <div id="landscape-warn">
        <h1 style="font-size: 5rem; margin: 0;">🔄</h1>
        <h2>PUTAR KE LANDSCAPE</h2>
        <p>Gunakan mode miring untuk mengontrol mobil sport!</p>
    </div>

    <div id="menu">
        <h1 style="font-size: 3rem; margin: 0; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue);">HAM_<span style="color:white">CITY</span></h1>
        <p style="opacity:0.5; margin-bottom: 30px; letter-spacing: 5px;">SUPER SPORT EDITION</p>
        <button class="btn" onclick="startAs('screen')">HOST CITY (PC)</button>
        <button class="btn" onclick="startAs('controller')" style="border-color: var(--neon-pink);">JOIN DRIVE (HP)</button>
    </div>

    <div id="ui-overlay">
        <div class="p-label id-display">ID: <span id="peer-id-text">INIT...</span></div>
    </div>

    <div id="ctrl-view">
        <div id="wheel" class="stier"></div>
        <input type="text" id="target-id" placeholder="PASTE ID: ham_..." style="margin: 20px; padding: 12px; text-align: center; background: #111; border: 1px solid #333; color: var(--neon-blue); width: 220px;">
        <button class="btn" onclick="connectToServer()">START LINK</button>
        <div class="nitro-zone">HOLD FOR NITRO</div>
    </div>

    <script>
        let players = [];
        let scene, renderer, clock;
        const worldSize = 800;

        function genId() {
            return 'ham_' + Math.random().toString(36).substr(2, 9);
        }
        const peer = new Peer(genId());

        function startAs(type) {
            document.getElementById('menu').style.display = 'none';
            if(type === 'screen') {
                document.getElementById('ui-overlay').style.display = 'block';
                initWorld();
            } else {
                document.getElementById('ctrl-view').style.display = 'flex';
            }
        }

        function createCarModel(color) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: color, shininess: 100 });
            const glassMat = new THREE.MeshPhongMaterial({ color: 0x000000, transparent: true, opacity: 0.6 });
            const wheelMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            const neonMat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 2 });

            // Body Utama
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 3), bodyMat);
            body.position.y = 0.3;
            group.add(body);

            // Kabin
            const cabin = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16, 0, Math.PI*2, 0, Math.PI/2), glassMat);
            cabin.scale.set(1.2, 0.8, 1.8);
            cabin.position.set(0, 0.5, 0.2);
            group.add(cabin);

            // Spoiler
            const s1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), bodyMat);
            s1.position.set(0.5, 0.6, 1.3);
            const s2 = s1.clone();
            s2.position.x = -0.5;
            const wing = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.05, 0.5), bodyMat);
            wing.position.set(0, 0.8, 1.3);
            group.add(s1, s2, wing);

            // Roda & Pelek Neon
            const wPos = [[-0.8, 1.1], [0.8, 1.1], [-0.8, -1.1], [0.8, -1.1]];
            wPos.forEach(p => {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.3, 12), wheelMat);
                w.rotation.z = Math.PI / 2;
                w.position.set(p[0], 0.1, p[1]);
                const pelek = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.32, 6), neonMat);
                pelek.rotation.z = Math.PI/2;
                pelek.position.copy(w.position);
                group.add(w, pelek);
            });

            return group;
        }

        function initWorld() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.007);
            clock = new THREE.Clock();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            scene.add(new THREE.GridHelper(2000, 100, 0x00f3ff, 0x111111));

            // Bangunan
            for(let i=0; i<400; i++) {
                const h = Math.random()*40+10;
                const b = new THREE.Mesh(new THREE.BoxGeometry(6, h, 6), new THREE.MeshPhongMaterial({color: 0x111111, emissive: 0x001122}));
                b.position.set((Math.random()-0.5)*1200, h/2, (Math.random()-0.5)*1200);
                if(Math.abs(b.position.x) < 20) b.position.x += 40;
                scene.add(b);
            }

            peer.on('open', id => document.getElementById('peer-id-text').innerText = id);
            peer.on('connection', conn => {
                if(players.length >= 2) return;
                const pID = players.length+1;
                const color = pID === 1 ? 0xff00ea : 0x39ff14;
                const p = {
                    conn, id: pID, nitro: false, tilt: 0, speed: 0, rot: 0,
                    car: createCarModel(color),
                    cam: new THREE.PerspectiveCamera(75, window.innerWidth/(window.innerHeight/2), 0.1, 2000)
                };
                p.car.position.set(pID*10, 0, 0);
                scene.add(p.car);
                players.push(p);
                conn.on('data', d => { p.tilt = d.tilt; p.nitro = d.nitro; });
                if(players.length === 1) loop();
            });
        }

        function loop() {
            requestAnimationFrame(loop);
            const h = window.innerHeight;
            const w = window.innerWidth;
            renderer.setScissorTest(true);

            players.forEach((p, i) => {
                // Fisika
                p.speed = THREE.MathUtils.lerp(p.speed, p.nitro?1.6:0.7, 0.05);
                p.rot -= p.tilt * 0.0008 * (p.speed*2.2);
                p.car.rotation.y = p.rot;
                p.car.translateZ(-p.speed);

                // Kamera
                const offset = new THREE.Vector3(0, 3, 10).applyMatrix4(p.car.matrixWorld);
                p.cam.position.lerp(offset, 0.1);
                p.cam.lookAt(p.car.position);
                p.cam.fov = THREE.MathUtils.lerp(p.cam.fov, p.nitro?95:75, 0.1);
                p.cam.updateProjectionMatrix();

                // Render Split Screen (Fixed Order)
                const bottom = i === 0 ? h/2 : 0;
                renderer.setViewport(0, bottom, w, h/2);
                renderer.setScissor(0, bottom, w, h/2);
                renderer.render(scene, p.cam);
            });
        }

        function connectToServer() {
            const tid = document.getElementById('target-id').value.trim();
            const conn = peer.connect(tid);
            let nitro = false;

            document.body.addEventListener('touchstart', () => { nitro=true; if(navigator.vibrate) navigator.vibrate(30); });
            document.body.addEventListener('touchend', () => nitro=false);

            conn.on('open', () => {
                document.getElementById('ctrl-view').innerHTML = `<div class="stier" id="w"></div><h2 style="color:var(--neon-green)">DRIVE ACTIVE</h2>`;
                window.addEventListener('deviceorientation', e => {
                    let tilt = Math.round(e.gamma || 0);
                    if(Math.abs(tilt) < 2) tilt = 0; // Deadzone fix
                    const w = document.getElementById('w');
                    if(w) w.style.transform = `rotate(${tilt*2.5}deg)`;
                    conn.send({ tilt, nitro });
                });
            });
        }
    </script>
</body>
</html>
