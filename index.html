<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Tap 1v1 P2P - LEGO Style</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        :root { --p1: #ff4757; --p2: #2e86de; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1c40f; color: #2c3e50; text-align: center; margin: 0; overflow: hidden; touch-action: none; transition: background 0.4s; }
        .screen { display: none; padding: 20px; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; }
        .active { display: flex; }
        
        #landscape-msg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2c3e50; color: white; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        @media screen and (orientation: portrait) { #monitor-screen.active ~ #landscape-msg { display: flex; } }

        body.skin-classic { background: #f1c40f; }
        body.skin-space { background: #2c3e50; color: #ecf0f1; }
        body.skin-forest { background: #27ae60; }

        button { padding: 15px 30px; font-size: 1rem; cursor: pointer; border: 4px solid #2c3e50; border-radius: 15px; margin: 5px; transition: 0.1s; background: #ecf0f1; color: #2c3e50; font-weight: 900; text-transform: uppercase; box-shadow: 4px 4px 0px #2c3e50; -webkit-tap-highlight-color: transparent; }
        button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #2c3e50; }
        .skin-btn { padding: 8px 12px; font-size: 0.7rem; margin: 3px; background: #fff; }
        
        input { padding: 12px; border: 4px solid #2c3e50; border-radius: 12px; width: 220px; font-size: 1.1rem; margin-bottom: 10px; text-align: center; background: #fff; font-weight: bold; outline: none; }
        input.error { border-color: #ff4757; animation: shake 0.3s; box-shadow: 0 0 10px #ff4757; }

        #room-id-display { background: #fff; color: #2c3e50; padding: 15px 30px; border: 5px solid #2c3e50; border-radius: 20px; font-size: 3.5rem; font-weight: 900; margin: 10px 0; letter-spacing: 5px; box-shadow: 8px 8px 0px #c0392b; }
        #track { display: none; width: 90%; height: 110px; background: #2c3e50; border: 6px solid #fff; border-radius: 55px; position: relative; margin: 25px 0; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .bar { height: 100%; transition: width 0.08s ease-out; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; color: white; text-shadow: 2px 2px #000; overflow: hidden; }
        .bar span { font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; font-weight: normal; }

        #status-text { font-size: 2.2rem; color: #fff; text-transform: uppercase; margin: 15px 0; min-height: 1.2em; text-shadow: 4px 4px #c0392b; -webkit-text-stroke: 1.5px #2c3e50; }
        #round-info { display: none; font-size: 1.3rem; font-weight: 900; background: #fff; color: #2c3e50; padding: 8px 25px; border-radius: 50px; border: 3px solid #2c3e50; margin-bottom: 10px; }

        #speed-alert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #fff; color: #2c3e50; padding: 25px 50px; border: 8px solid #2c3e50; border-radius: 30px; font-size: 3rem; font-weight: 900; z-index: 5000; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.4); pointer-events: none; white-space: nowrap; box-shadow: 15px 15px 0 rgba(0,0,0,0.3); }
        #speed-alert.show { transform: translate(-50%, -50%) scale(1); }

        .tap-area { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none; font-size: 5rem; font-weight: 900; color: white; user-select: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shaking { animation: shake 0.1s infinite; }
    </style>
</head>
<body class="skin-classic">

    <audio id="bgm-menu" loop preload="auto">
        <source src="https://image2url.com/r2/default/audio/1775290560696-3795209f-6e46-433c-a94c-18ac02c047a4.mp3" type="audio/mpeg">
    </audio>
    <audio id="bgm-battle" loop preload="auto">
        <source src="https://image2url.com/r2/default/audio/1775290622313-a7846eca-967a-4dcc-88dd-cb8e330cf6a6.mp3" type="audio/mpeg">
    </audio>

    <div id="menu-screen" class="screen active">
        <h1 style="font-size: 2.5rem; margin-bottom: 5px; -webkit-text-stroke: 1px #fff;">TAPTAP 1V1</h1>
        <div style="margin-bottom: 15px;">
            <p style="font-weight: bold; font-size: 0.8rem; margin: 5px;">ENTER NAME TO UNLOCK:</p>
            <input type="text" id="user-name" placeholder="NAME REQUIRED!" maxlength="10" spellcheck="false">
            <div style="margin-top: 5px;">
                <button class="skin-btn" onclick="setSkin('classic')">Classic</button>
                <button class="skin-btn" onclick="setSkin('space')">Space</button>
                <button class="skin-btn" onclick="setSkin('forest')">Forest</button>
            </div>
        </div>
        <button onclick="checkNameBefore(startMonitorMode)">START MONITOR</button>
        <div style="margin: 10px 0; font-weight: bold; opacity: 0.6;">━━━━ OR ━━━━</div>
        <input type="text" id="join-id" placeholder="ROOM CODE" maxlength="5">
        <button onclick="checkNameBefore(initController)">JOIN BATTLE</button>
    </div>

    <div id="monitor-screen" class="screen">
        <div id="round-info">ROUND 1</div>
        <div id="room-id-display">.....</div>
        <h3 id="status-text">WAITING...</h3>
        <div id="track">
            <div id="bar-p1" class="bar" style="width: 50%; background: var(--p1);"><b id="name-p1">P1</b><span>READY</span></div>
            <div id="bar-p2" class="bar" style="width: 50%; background: var(--p2);"><b id="name-p2">P2</b><span>READY</span></div>
        </div>
        <div id="speed-alert">SO FAST!!</div>
    </div>

    <div id="landscape-msg">
        <p style="font-size: 3rem;">🔄</p>
        <p style="font-weight: bold;">PLEASE ROTATE TO LANDSCAPE</p>
    </div>

    <div id="controller-screen" class="screen" style="padding:0;">
        <button id="btn-tap" class="tap-area" disabled>CONNECTING...</button>
    </div>

    <script>
        let peer = null, players = { p1: null, p2: null };
        let playerNames = { p1: "Player One", p2: "Player Two" };
        let score = 50, gameActive = false, currentSkin = 'classic';
        let p1Wins = 0, p2Wins = 0, currentRound = 1;
        let commentaryLock = false, isSpeakingMain = false;
        
        let tapHistory = { p1: [], p2: [] };
        let alertTimeout = null;

        const menuAudio = document.getElementById('bgm-menu');
        const battleAudio = document.getElementById('bgm-battle');
        let audioCtx = null;

        function checkNameBefore(action) {
            const nameField = document.getElementById('user-name');
            if (!nameField.value.trim()) {
                nameField.classList.add('error');
                setTimeout(() => nameField.classList.remove('error'), 500);
                nameField.focus(); return;
            }
            action();
        }

        const enableAudio = () => {
            initAudio();
            if (menuAudio.paused && !players.p1) menuAudio.play().catch(() => {});
            document.removeEventListener('click', enableAudio);
            document.removeEventListener('touchstart', enableAudio);
        };
        document.addEventListener('click', enableAudio);

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function setSkin(type) {
            currentSkin = type;
            document.body.className = 'skin-' + type;
            const themes = {
                classic: { p1: '#ff4757', p2: '#2e86de' },
                space: { p1: '#9b59b6', p2: '#1abc9c' },
                forest: { p1: '#e67e22', p2: '#2ecc71' }
            };
            document.documentElement.style.setProperty('--p1', themes[type].p1);
            document.documentElement.style.setProperty('--p2', themes[type].p2);
            if (players.p1) players.p1.send({ type: 'skin', skin: type });
            if (players.p2) players.p2.send({ type: 'skin', skin: type });
        }

        function playTrumpet() {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.8);
        }

        function playMusic(mode) {
            menuAudio.pause(); battleAudio.pause();
            if(mode === 'menu') { menuAudio.currentTime = 0; menuAudio.play().catch(() => {}); }
            else if(mode === 'battle') { battleAudio.currentTime = 0; battleAudio.play().catch(() => {}); }
        }

        function speak(text, isMain = false, callback) {
            if (isMain) { window.speechSynthesis.cancel(); isSpeakingMain = true; }
            else if (isSpeakingMain || window.speechSynthesis.speaking) return; 

            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 1.2;
            msg.onend = () => { if (isMain) isSpeakingMain = false; if (callback) callback(); };
            window.speechSynthesis.speak(msg);
        }

        async function startMonitorMode() {
            initAudio(); playMusic('menu');
            try { if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen(); } catch (e) {}
            initMonitor();
        }

        function initMonitor() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let roomID = "";
            for(let i=0; i<5; i++) roomID += chars.charAt(Math.floor(Math.random() * chars.length));
            showScreen('monitor-screen');
            peer = new Peer(roomID);
            peer.on('open', id => { document.getElementById('room-id-display').innerText = id; });

            peer.on('connection', conn => {
                conn.on('open', () => {
                    let role = !players.p1 ? "p1" : (!players.p2 ? "p2" : null);
                    if (role) {
                        players[role] = conn;
                        conn.send({ type: 'init', role: role, skin: currentSkin });
                    }
                });
                conn.on('data', data => { 
                    if (data.type === 'join_name') {
                        playerNames[data.role] = data.name || (data.role === 'p1' ? "Player One" : "Player Two");
                        document.getElementById('name-' + data.role).innerText = playerNames[data.role].toUpperCase();
                        if (players.p1 && players.p2) {
                            document.getElementById('room-id-display').style.display = 'none';
                            startRoundSequence();
                        } else {
                            document.getElementById('status-text').innerText = "1 MORE PLAYER...";
                        }
                    }
                    if (data.type === 'tap' && gameActive) { 
                        score += (data.role === 'p1' ? 2 : -2); 
                        checkSpeed(data.role); updateDisplay(); 
                    } 
                });
                conn.on('close', () => location.reload());
            });
        }

        function checkSpeed(role) {
            const now = Date.now();
            tapHistory[role].push(now);
            tapHistory[role] = tapHistory[role].filter(t => now - t < 1000);
            if (tapHistory[role].length >= 8) {
                showSpeedAlert(playerNames[role] + " SO FAST!!");
                tapHistory[role] = []; 
            }
        }

        function showSpeedAlert(text) {
            const alertBox = document.getElementById('speed-alert');
            alertBox.classList.remove('show');
            void alertBox.offsetWidth; 
            alertBox.innerText = text;
            alertBox.classList.add('show');
            speak(text, false);
            if (alertTimeout) clearTimeout(alertTimeout);
            alertTimeout = setTimeout(() => { alertBox.classList.remove('show'); }, 2000);
        }

        function startRoundSequence() {
            gameActive = false; score = 50; commentaryLock = false;
            tapHistory = { p1: [], p2: [] };
            updateDisplay();
            document.getElementById('track').style.display = 'none';
            document.getElementById('status-text').innerText = "ROUND " + currentRound;
            const ri = document.getElementById('round-info');
            ri.style.display = 'block';
            ri.innerText = `ROUND ${currentRound} - ${p1Wins} : ${p2Wins}`;
            
            speak("Round " + currentRound, true, () => {
                setTimeout(() => {
                    speak("Ready", true, () => {
                        setTimeout(() => {
                            speak("Go", true); playTrumpet();
                            document.getElementById('status-text').innerText = "FIGHT!";
                            document.getElementById('track').style.display = 'flex';
                            gameActive = true; playMusic('battle');
                        }, 800);
                    });
                }, 800);
            });
        }

        function updateDisplay() {
            document.getElementById('bar-p1').style.width = score + '%';
            document.getElementById('bar-p2').style.width = (100 - score) + '%';
            if (score > 85 || score < 15) {
                document.getElementById('track').classList.add('shaking');
                if (!commentaryLock) { speak("Almost there!", true); commentaryLock = true; }
            } else { document.getElementById('track').classList.remove('shaking'); }

            if (score >= 100 || score <= 0) {
                gameActive = false; battleAudio.pause();
                let winnerRole = score >= 100 ? "p1" : "p2";
                let loserRole = winnerRole === "p1" ? "p2" : "p1";
                winnerRole === "p1" ? p1Wins++ : p2Wins++;
                players[loserRole].send({ type: 'punish' });
                speak(playerNames[winnerRole] + " wins the round!", true);
                if (p1Wins === 2 || p2Wins === 2) {
                    setTimeout(() => {
                        speak("Final Champion is " + playerNames[winnerRole], true);
                        alert(`GAME OVER! ${playerNames[winnerRole].toUpperCase()} IS THE CHAMPION!`);
                        location.reload();
                    }, 2000);
                } else { currentRound++; setTimeout(startRoundSequence, 3000); }
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function updateControllerUI(btn, role, skin) {
            const colors = { classic: ['#ff4757', '#2e86de'], space: ['#9b59b6', '#1abc9c'], forest: ['#e67e22', '#2ecc71'] };
            btn.style.background = role === 'p1' ? colors[skin][0] : colors[skin][1];
            btn.innerText = "TAP!"; btn.disabled = false;
        }

        function initController() {
            const id = document.getElementById('join-id').value.trim().toUpperCase();
            const name = document.getElementById('user-name').value.trim();
            if (id.length < 5) return alert("KODE SALAH!");
            showScreen('controller-screen');
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(id, { reliable: true });
                let myRole = null;
                conn.on('open', () => {
                    conn.on('data', data => {
                        const btn = document.getElementById('btn-tap');
                        if (data.type === 'init') {
                            myRole = data.role;
                            updateControllerUI(btn, myRole, data.skin);
                            conn.send({ type: 'join_name', role: myRole, name: name });
                            btn.onpointerdown = (e) => { e.preventDefault(); initAudio(); conn.send({ type: 'tap', role: myRole }); if(navigator.vibrate) navigator.vibrate(40); };
                        }
                        if (data.type === 'skin') { updateControllerUI(btn, myRole, data.skin); }
                        if (data.type === 'punish' && navigator.vibrate) { navigator.vibrate([1000, 200, 1000]); }
                    });
                });
                conn.on('close', () => location.reload());
            });
        }
    </script>
</body>
</html>
