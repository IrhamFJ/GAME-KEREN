<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAM_CITY V3.4 - FINAL URBAN</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --city-sky: #87CEEB; --action-red: #d32f2f; --action-green: #388e3c; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; outline: none; box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--city-sky); overflow: hidden; touch-action: none; }
        
        /* MENU */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f0f0; z-index: 100; position: relative; }
        .btn { padding: 15px 35px; border: 2px solid #222; background: white; cursor: pointer; font-weight: bold; margin: 10px; width: 250px; border-radius: 8px; text-transform: uppercase; font-size: 1rem; }
        .btn-join { border-color: var(--action-red); color: var(--action-red); }
        
        /* HOST UI */
        #ui-overlay { position: absolute; top: 20px; right: 20px; z-index: 1000; display: none; }
        .kode-box { background: white; padding: 12px 25px; border: 2px solid #222; border-radius: 12px; font-family: monospace; font-size: 1.4rem; font-weight: bold; }
        
        #host-waiting-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; align-items: center; z-index: 5; pointer-events: none; }
        .radar { width: 120px; height: 120px; border: 4px solid #fff; border-radius: 50%; position: relative; animation: pulse 2s infinite; }
        .radar::after { content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px; border: 4px solid #fff; border-radius: 50%; animation: ripple 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        .waiting-text { margin-top: 30px; font-weight: 900; letter-spacing: 5px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }

        /* CONTROLLER */
        #ctrl-view { display: none; height: 100vh; width: 100vw; background: #eee; position: relative; }
        .steer-group { position: absolute; bottom: 30px; left: 30px; display: flex; gap: 20px; }
        .arrow-btn { width: 110px; height: 110px; background: white; border: 3px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; box-shadow: 0 5px 0 #bbb; }
        .pedal-group { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .pedal { width: 100px; background: white; border: 4px solid #ccc; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .pedal-gas { height: 180px; border-color: var(--action-green); color: var(--action-green); }
        .pedal-brake { height: 110px; border-color: var(--action-red); color: var(--action-red); }
        .active-btn { background: #e0e0e0 !important; transform: translateY(4px); box-shadow: none !important; }
        #target-id { padding: 15px; text-align: center; border: 2px solid #ccc; width: 260px; font-size: 1.5rem; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="margin:0; font-size: 3rem;">HAM_CITY</h1>
        <p style="color:#666; letter-spacing: 3px; margin-bottom: 30px;">V3.4 FINAL STABLE</p>
        <button class="btn" onclick="preStart('screen')">HOST CITY (PC)</button>
        <button class="btn btn-join" onclick="preStart('controller')">JOIN DRIVE (HP)</button>
    </div>

    <div id="host-waiting-ui">
        <div class="radar"></div>
        <div class="waiting-text">WAITING FOR DRIVERS</div>
    </div>

    <div id="ui-overlay"><div class="kode-box">KODE: <span id="peer-id-text">...</span></div></div>

    <div id="ctrl-view">
        <div id="setup-ui" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center;">
            <input type="text" id="target-id" placeholder="MASUKKAN KODE">
            <button class="btn" style="border-color: var(--action-green); color: var(--action-green);" onclick="connectToServer()">START ENGINE</button>
        </div>
        <div id="game-pad" style="display: none; width: 100%; height: 100%;">
            <div class="steer-group"><div class="arrow-btn" id="btn-left">←</div><div class="arrow-btn" id="btn-right">→</div></div>
            <div class="pedal-group"><div class="pedal pedal-gas" id="btn-up">GAS</div><div class="pedal pedal-brake" id="btn-down">BRAKE</div></div>
        </div>
    </div>

    <script>
        let players = [], scene, renderer, peer;
        let keys = { up: false, down: false, left: false, right: false };
        const myCustomId = 'HAM-' + Math.floor(10000 + Math.random() * 90000);

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
        }

        function preStart(type) {
            toggleFullScreen();
            document.getElementById('menu').style.display = 'none';
            peer = new Peer(myCustomId);
            if(type === 'screen') {
                document.getElementById('ui-overlay').style.display = 'block';
                document.getElementById('peer-id-text').innerText = myCustomId;
                document.getElementById('host-waiting-ui').style.display = 'flex';
                initWorld();
            } else {
                document.getElementById('ctrl-view').style.display = 'block';
                setupMobileControls();
            }
        }

        function createCar(color) {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.6, 3), new THREE.MeshStandardMaterial({ color, roughness: 0.3 }));
            body.position.y = 0.6; body.castShadow = true; g.add(body);
            const glass = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            glass.position.set(0, 1.1, 0.1); g.add(glass);
            [[-0.8, 1], [0.8, 1], [-0.8, -1], [0.8, -1]].forEach(p => {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16), new THREE.MeshStandardMaterial({color: 0x111}));
                w.rotation.z = Math.PI/2; w.position.set(p[0], 0.4, p[1]); g.add(w);
            });
            return g;
        }

        function initWorld() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 450);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50); sun.castShadow = true;
            scene.add(sun);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);
            const grid = new THREE.GridHelper(5000, 150, 0x444444, 0xffffff);
            grid.position.y = 0.05; scene.add(grid);

            // Bangunan
            const bGeo = new THREE.BoxGeometry(1, 1, 1);
            for(let i=0; i<500; i++) {
                const h = Math.random()*40 + 10;
                const b = new THREE.Mesh(bGeo, new THREE.MeshStandardMaterial({ color: 0x777777 + Math.random()*0x333333 }));
                b.scale.set(Math.random()*5+7, h, Math.random()*5+7);
                let px = (Math.random()-0.5)*1000, pz = (Math.random()-0.5)*1000;
                if(Math.abs(px) < 25) px += 35;
                b.position.set(px, h/2, pz); b.castShadow = true; b.receiveShadow = true;
                scene.add(b);
            }

            peer.on('connection', conn => {
                if(players.length >= 2) return;
                document.getElementById('host-waiting-ui').style.display = 'none';
                const pID = players.length + 1;
                const p = { conn, id: pID, input: { up:0, down:0, left:0, right:0 }, car: createCar(pID===1?0xd32f2f:0xffffff), cam: new THREE.PerspectiveCamera(75, 1, 0.1, 1000), speed: 0, rot: 0 };
                p.car.position.set(pID === 1 ? 5 : -5, 0, 0); scene.add(p.car); players.push(p);
                conn.on('data', d => p.input = d);
                const close = () => { 
                    scene.remove(p.car); 
                    players = players.filter(x => x.id !== p.id);
                    if(players.length === 0) document.getElementById('host-waiting-ui').style.display = 'flex';
                };
                conn.on('close', close); conn.on('error', close);
                if(players.length === 1) animate();
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const w = window.innerWidth, h = window.innerHeight;
            const isSplit = players.length > 1;

            players.forEach((p, i) => {
                let target = p.input.up ? 1.25 : (p.input.down ? -0.5 : 0);
                p.speed = THREE.MathUtils.lerp(p.speed, target, 0.1);
                if(p.input.left) p.rot += 0.045; if(p.input.right) p.rot -= 0.045;
                p.car.rotation.y = p.rot; p.car.translateZ(-p.speed);
                
                p.cam.aspect = isSplit ? w/(h/2) : w/h; p.cam.updateProjectionMatrix();
                const camPos = new THREE.Vector3(0, 5, 13).applyMatrix4(p.car.matrixWorld);
                p.cam.position.lerp(camPos, 0.12); p.cam.lookAt(p.car.position);

                if(isSplit) {
                    renderer.setScissorTest(true);
                    const rect = i === 0 ? [0, h/2, w, h/2] : [0, 0, w, h/2];
                    renderer.setViewport(...rect); renderer.setScissor(...rect);
                } else {
                    renderer.setScissorTest(false);
                    renderer.setViewport(0, 0, w, h);
                }
                renderer.render(scene, p.cam);
            });
        }

        function setupMobileControls() {
            const bind = (id, k) => {
                const el = document.getElementById(id);
                const up = (v) => { keys[k] = v; el.classList.toggle('active-btn', v); if(window.currentConn) window.currentConn.send(keys); };
                el.addEventListener('touchstart', (e) => { e.preventDefault(); up(true); if(navigator.vibrate) navigator.vibrate(20); });
                el.addEventListener('touchend', (e) => { e.preventDefault(); up(false); });
            };
            bind('btn-up', 'up'); bind('btn-down', 'down');
            bind('btn-left', 'left'); bind('btn-right', 'right');
        }

        function connectToServer() {
            toggleFullScreen();
            const id = document.getElementById('target-id').value.toUpperCase().trim();
            if(!id) return;
            const conn = peer.connect(id);
            conn.on('open', () => { window.currentConn = conn; document.getElementById('setup-ui').style.display='none'; document.getElementById('game-pad').style.display='block'; });
        }
    </script>
</body>
</html>
