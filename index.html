<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAM_CITY V2.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ea; --neon-green: #39ff14; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; overflow: hidden; touch-action: none; }
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #000; }
        .btn { padding: 12px 30px; border: 2px solid var(--neon-blue); color: white; background: none; cursor: pointer; font-weight: bold; margin: 8px; width: 220px; text-transform: uppercase; border-radius: 4px; }
        #ui-overlay { position: absolute; top: 15px; right: 15px; z-index: 1000; display: none; }
        .kode-box { background: rgba(0,0,0,0.8); padding: 10px 20px; border: 2px solid var(--neon-blue); border-radius: 8px; font-family: monospace; font-size: 1.2rem; box-shadow: 0 0 10px var(--neon-blue); }
        
        /* Controller */
        #ctrl-view { display: none; height: 100vh; background: #050505; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .dpad { display: grid; grid-template-columns: 80px 80px 80px; grid-template-rows: 80px 80px; gap: 15px; margin-bottom: 30px; }
        .ctrl-btn { width: 80px; height: 80px; background: #1a1a1a; border: 2px solid #333; color: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2rem; user-select: none; -webkit-tap-highlight-color: transparent; }
        .ctrl-btn:active { background: var(--neon-blue); border-color: #fff; transform: scale(0.9); }
        .nitro-btn { width: 270px; height: 60px; background: linear-gradient(45deg, #f0e, #800075); border: none; color: white; font-weight: bold; border-radius: 10px; text-transform: uppercase; letter-spacing: 3px; font-size: 1.1rem; }
        #target-id { padding: 15px; text-align: center; background: #111; border: 2px solid #444; color: var(--neon-blue); width: 240px; font-size: 1.3rem; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin:0; font-size: 3rem;">HAM_CITY</h1>
        <p style="opacity:0.4; letter-spacing: 5px; margin-bottom: 30px;">V2.1 STABLE ENGINE</p>
        <button class="btn" onclick="preStart('screen')">HOST CITY (PC)</button>
        <button class="btn" onclick="preStart('controller')" style="border-color: var(--neon-pink);">JOIN DRIVE (HP)</button>
    </div>

    <div id="ui-overlay"><div class="kode-box">CODE: <span id="peer-id-text" style="color:var(--neon-blue)">...</span></div></div>

    <div id="ctrl-view">
        <div id="setup-ui">
            <input type="text" id="target-id" placeholder="MASUKKAN KODE">
            <button class="btn" style="width: 270px; border-color: var(--neon-green);" onclick="connectToServer()">START ENGINE</button>
        </div>
        <div id="game-pad" style="display: none; flex-direction: column; align-items: center;">
            <div class="dpad">
                <div></div> <div class="ctrl-btn" id="btn-up">↑</div> <div></div>
                <div class="ctrl-btn" id="btn-left">←</div> <div class="ctrl-btn" id="btn-down">↓</div> <div class="ctrl-btn" id="btn-right">→</div>
            </div>
            <button class="nitro-btn" id="btn-nitro">NITRO BOOST</button>
        </div>
    </div>

    <script>
        let players = [], scene, renderer, clock, peer;
        let keys = { up: false, down: false, left: false, right: false, nitro: false };
        const myCustomId = 'HAM-' + Math.floor(10000 + Math.random() * 90000);

        function preStart(type) {
            document.getElementById('menu').style.display = 'none';
            peer = new Peer(myCustomId);
            if(type === 'screen') {
                document.getElementById('ui-overlay').style.display = 'block';
                document.getElementById('peer-id-text').innerText = myCustomId;
                initWorld();
            } else {
                document.getElementById('ctrl-view').style.display = 'flex';
                setupMobileControls();
            }
        }

        function createCar(color) {
            const g = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 3), new THREE.MeshPhongMaterial({ color, shininess: 100 }));
            b.position.y = 0.3; g.add(b);
            const c = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 12, 0, 6.3, 0, 1.6), new THREE.MeshPhongMaterial({ color: 0x000, transparent: true, opacity: 0.8 }));
            c.scale.set(1, 0.75, 1.6); c.position.set(0, 0.5, 0.2); g.add(c);
            
            // Ban Neon
            const wPos = [[-0.8, 1], [0.8, 1], [-0.8, -1], [0.8, -1]];
            wPos.forEach(p => {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.3, 12), new THREE.MeshPhongMaterial({color:0x111}));
                w.rotation.z = Math.PI/2; w.position.set(p[0], 0.1, p[1]);
                const pk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.32, 6), new THREE.MeshPhongMaterial({color, emissive: color}));
                pk.rotation.z = Math.PI/2; pk.position.copy(w.position);
                g.add(w, pk);
            });
            return g;
        }

        function initWorld() {
            scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0, 0.006);
            clock = new THREE.Clock();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            scene.add(new THREE.GridHelper(3000, 100, 0x00f3ff, 0x111111));
            for(let i=0; i<350; i++) {
                const h = Math.random()*40+10;
                const b = new THREE.Mesh(new THREE.BoxGeometry(8, h, 8), new THREE.MeshPhongMaterial({color: 0x111, emissive: 0x001122}));
                b.position.set((Math.random()-0.5)*1800, h/2, (Math.random()-0.5)*1800);
                scene.add(b);
            }

            peer.on('connection', conn => {
                if(players.length >= 2) return;
                const pID = players.length + 1;
                const p = {
                    conn, id: pID, input: { up:false, down:false, left:false, right:false, nitro:false },
                    car: createCar(pID === 1 ? 0xff00ea : 0x39ff14),
                    cam: new THREE.PerspectiveCamera(75, 1, 0.1, 4000),
                    speed: 0, rot: 0
                };
                scene.add(p.car); players.push(p);
                conn.on('data', d => { p.input = d; });
                if(players.length === 1) loop();
            });
        }

        function loop() {
            requestAnimationFrame(loop);
            const w = window.innerWidth, h = window.innerHeight;
            const isSplit = players.length > 1;
            renderer.setScissorTest(isSplit);

            players.forEach((p, i) => {
                let targetSpeed = 0;
                if(p.input.up) targetSpeed = p.input.nitro ? 1.9 : 0.85;
                if(p.input.down) targetSpeed = -0.45;
                p.speed = THREE.MathUtils.lerp(p.speed, targetSpeed, 0.08);

                const turnMod = (p.speed > 0 ? 1 : -1) * (Math.abs(p.speed) > 0.1 ? 1 : 0);
                if(p.input.left) p.rot += 0.045 * turnMod;
                if(p.input.right) p.rot -= 0.045 * turnMod;

                p.car.rotation.y = p.rot;
                p.car.translateZ(-p.speed);

                p.cam.aspect = isSplit ? w / (h / 2) : w / h;
                p.cam.updateProjectionMatrix();
                const off = new THREE.Vector3(0, 4, 12).applyMatrix4(p.car.matrixWorld);
                p.cam.position.lerp(off, 0.12); p.cam.lookAt(p.car.position);

                if(isSplit) {
                    const bottom = i === 0 ? h/2 : 0; // P1 Atas, P2 Bawah
                    renderer.setViewport(0, bottom, w, h/2); renderer.setScissor(0, bottom, w, h/2);
                } else {
                    renderer.setViewport(0, 0, w, h);
                }
                renderer.render(scene, p.cam);
            });
        }

        function setupMobileControls() {
            const bind = (id, key) => {
                const el = document.getElementById(id);
                const update = (val) => { keys[key] = val; if(window.currentConn) window.currentConn.send(keys); };
                el.addEventListener('touchstart', (e) => { e.preventDefault(); update(true); });
                el.addEventListener('touchend', (e) => { e.preventDefault(); update(false); });
                el.addEventListener('touchcancel', (e) => { e.preventDefault(); update(false); });
            };
            bind('btn-up', 'up'); bind('btn-down', 'down');
            bind('btn-left', 'left'); bind('btn-right', 'right');
            bind('btn-nitro', 'nitro');
        }

        function connectToServer() {
            const val = document.getElementById('target-id').value.toUpperCase().trim();
            if(!val) return;
            const conn = peer.connect(val);
            conn.on('open', () => {
                window.currentConn = conn;
                document.getElementById('setup-ui').style.display = 'none';
                document.getElementById('game-pad').style.display = 'flex';
                if(navigator.vibrate) navigator.vibrate([50, 30, 50]);
            });
        }
    </script>
</body>
</html>
