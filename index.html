<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLOCK DRIFT V1.5</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; touch-action: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* MENU */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #222 0%, #000 100%); color: #fff; text-align: center; z-index: 100; position: relative; }
        .btn { padding: 20px; width: 300px; margin: 15px; font-weight: bold; cursor: pointer; border: 4px solid #fff; background: transparent; color: #fff; font-family: 'Orbitron'; text-transform: uppercase; border-radius: 12px; }
        .btn:active { background: #fff; color: #000; transform: scale(0.95); }

        /* TV HOST UI */
        #host-ui { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 10; }
        #waiting-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 2rem; text-shadow: 0 0 15px #ff0055; animation: blk 1.5s infinite; }
        #host-info { position: absolute; top: 20px; right: 20px; background: #fff; color: #000; padding: 12px 25px; border-radius: 12px; font-weight: 900; pointer-events: auto; border: 3px solid #ff0055; }
        #fps { position: absolute; bottom: 10px; left: 10px; color: #00ff00; font-size: 0.9rem; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; }
        @keyframes blk { 50% { opacity: 0.2; } }

        /* HP CONTROLLER UI (JUMBO) */
        #ctrl-view { display: none; height: 100vh; width: 100vw; background: #050505; position: relative; }
        #dash { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: #111; border: 3px solid #444; padding: 10px; text-align: center; border-radius: 20px; width: 220px; box-shadow: 0 8px 0 #000; }
        #spd { color: #fff; font-size: 3.5rem; display: block; line-height: 1; }
        
        #nitro-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 140px; height: 140px; background: #ff0055; border: 6px solid #fff; border-radius: 50%; color: #fff; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; transition: 0.2s; box-shadow: 0 10px 0 #80002b; }
        #nitro-btn.active_n { background: #00f2ff; box-shadow: 0 0 40px #00f2ff; color: #000; transform: translateX(-50%) translateY(6px); box-shadow: none; }
        #nitro-btn.cd { background: #222 !important; border-color: #444 !important; color: #555 !important; box-shadow: none !important; transform: translateX(-50%) translateY(6px); }

        .p-grp { position: absolute; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 20px; }
        .pedal { width: 140px; border-radius: 25px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 4px solid #333; }
        .gas { height: 280px; background: linear-gradient(to bottom, #008800, #004400); font-size: 1.8rem; }
        .rem { height: 120px; background: linear-gradient(to bottom, #880000, #440000); font-size: 1.3rem; }
        
        .s-grp { position: absolute; bottom: 25px; left: 25px; display: flex; gap: 25px; }
        .btn-s { width: 130px; height: 130px; background: #111; color: #fff; border-radius: 50%; border: 4px solid #444; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; box-shadow: 0 10px 0 #000; }
        .act { filter: brightness(2.2); transform: translateY(8px); box-shadow: none !important; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="letter-spacing: 12px; font-size: 3.5rem; margin: 0;">BLOCK DRIFT</h1>
    <p style="color: #ff0055; margin-bottom: 40px;">V1.5 FINAL STABLE</p>
    <button class="btn" onclick="sys('host')">CREATE LOBBY (TV)</button>
    <button class="btn" onclick="sys('ctrl')">JOIN RACE (HP)</button>
    <p style="color: #444; font-size: 0.9rem;">[ Hotkey: Pencet 5 di Remote ]</p>
</div>

<div id="host-ui">
    <div id="waiting-msg">WAITING FOR DRIVERS...</div>
    <div id="host-info">CODE: <span id="id-val" style="color:#ff0055">...</span></div>
    <div id="fps">FPS: --</div>
</div>

<div id="ctrl-view">
    <div id="setup" style="padding-top: 120px; text-align: center;">
        <input type="text" id="target" placeholder="KODE TV" maxlength="7" style="padding:25px; font-size:2rem; width:85%; max-width:450px; text-align:center; border-radius:20px; border:4px solid #fff; background:#000; color:#fff; font-family:'Orbitron';"><br><br>
        <button class="btn" onclick="join()">IGNITION</button>
    </div>
    <div id="pad" style="display:none; width:100%; height:100%;">
        <div id="dash"><span id="spd">0</span><small style="color:#555">KM/H</small></div>
        <div id="nitro-btn">NITRO</div>
        <div class="s-grp"><div class="btn-s" id="l">←</div><div class="btn-s" id="r">→</div></div>
        <div class="p-grp"><div class="pedal gas" id="u">GAS</div><div class="pedal rem" id="d">BRAKE</div></div>
    </div>
</div>

<script>
let players=[], scene, renderer, peer, audioCtx, keys={u:0,d:0,l:0,r:0,n:0};
const myId = 'HAM-' + Math.floor(100+Math.random()*899);

// REMOTE HOTKEY 5
window.addEventListener('keydown', (e) => {
    if (e.keyCode === 53 || e.key === "5") {
        if (document.getElementById('menu').style.display !== 'none') sys('host');
    }
});

function sys(mode) {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('menu').style.display='none';
    if(mode==='host' && document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});

    peer = new Peer(myId);
    peer.on('open', id => {
        if(mode==='host') {
            document.getElementById('id-val').innerText=id;
            document.getElementById('host-ui').style.display='block';
            initHost();
        } else document.getElementById('ctrl-view').style.display='block';
    });
}

function initHost() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x010101);
    renderer = new THREE.WebGLRenderer({ antialias: false, precision: 'mediump' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(1);
    document.body.appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 1.4));
    const sun = new THREE.DirectionalLight(0xffffff, 0.6); sun.position.set(10,25,10); scene.add(sun);

    // ROAD TEXTURE
    const cv = document.createElement('canvas'); cv.width = 128; cv.height = 128;
    const cx = cv.getContext('2d');
    cx.fillStyle = '#111'; cx.fillRect(0,0,128,128);
    cx.fillStyle = '#fff'; cx.fillRect(60, 10, 8, 40); cx.fillRect(60, 70, 8, 40);
    const roadTex = new THREE.CanvasTexture(cv); roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping; roadTex.repeat.set(250, 250);
    const road = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshBasicMaterial({map: roadTex}));
    road.rotation.x = -Math.PI/2; scene.add(road);

    // INSTANCED CITY (SUPER FAST)
    const inst = new THREE.InstancedMesh(new THREE.BoxGeometry(10, 1, 10), new THREE.MeshStandardMaterial({color: 0x0a0a0a}), 600);
    const dmy = new THREE.Object3D();
    for(let i=0; i<600; i++){
        let x = (Math.random()-0.5)*3000, z = (Math.random()-0.5)*3000;
        if(Math.abs(x) < 55) x += 80 * (x>0?1:-1);
        dmy.position.set(x, 0, z);
        dmy.scale.set(1+Math.random()*3, 20+Math.random()*80, 1+Math.random()*3);
        dmy.updateMatrix(); inst.setMatrixAt(i, dmy.matrix);
    }
    scene.add(inst);

    let frames = 0;
    peer.on('connection', cn => {
        document.getElementById('waiting-msg').style.display='none';
        const p = { 
            conn: cn, speed: 0, steer: 0, 
            car: createCar(), 
            cam: new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 3500), 
            input: {u:0,d:0,l:0,r:0,n:0} 
        };
        // HEAVY ENGINE AUDIO (BASS FOCUS)
        const osc = audioCtx.createOscillator(); const lpf = audioCtx.createBiquadFilter(); const gn = audioCtx.createGain();
        lpf.type = 'lowpass'; lpf.frequency.value = 220; 
        osc.type = 'square'; gn.gain.value = 0.05;
        osc.connect(lpf); lpf.connect(gn); gn.connect(audioCtx.destination); osc.start();
        p.audio = {osc, lpf, gn}; scene.add(p.car); players.push(p);
        cn.on('data', d => p.input = d);
        if(players.length === 1) renderLoop();
    });

    setInterval(() => {
        document.getElementById('fps').innerText = "FPS: " + frames; frames = 0;
    }, 1000);
}

function createCar() {
    const g = new THREE.Group();
    const b = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.8, 4.3), new THREE.MeshStandardMaterial({color: Math.random()*0xffffff}));
    b.position.y = 0.7; g.add(b);
    const wG = new THREE.BoxGeometry(0.55, 0.75, 0.75), wM = new THREE.MeshBasicMaterial({color: 0x000000});
    [[-1.2, 0.38, 1.3], [1.2, 0.38, 1.3], [-1.2, 0.38, -1.3], [1.2, 0.38, -1.3]].forEach(p => {
        const w = new THREE.Mesh(wG, wM); w.position.set(...p); g.add(w);
    });
    return g;
}

function renderLoop() {
    requestAnimationFrame(renderLoop);
    players.forEach(p => {
        // SMOOTH HANDLING PHYSICS
        let n = p.input.nitro_on ? 2.6 : 1.0, a = p.input.nitro_on ? 0.08 : 0.024;
        if(p.input.u) p.speed = Math.min(p.speed + a, 1.9 * n); else p.speed *= 0.983;
        if(p.input.d) p.speed *= 0.82;
        
        let targetSteer = 0;
        if(p.input.l) targetSteer = 0.048;
        if(p.input.r) targetSteer = -0.048;
        p.steer += (targetSteer - p.steer) * 0.14; // Lerp Steering
        
        p.car.translateZ(-p.speed);
        if(Math.abs(p.speed) > 0.05) p.car.rotation.y += p.steer * (Math.min(p.speed, 1.2));

        // HEAVY ENGINE FREQUENCY
        let f = 28 + (p.speed * 42) + (p.input.nitro_on ? 25 : 0);
        p.audio.osc.frequency.setTargetAtTime(f, audioCtx.currentTime, 0.1);
        p.audio.gn.gain.setTargetAtTime(p.input.u ? 0.12 : 0.04, audioCtx.currentTime, 0.1);

        // CAM TRACKING
        let cO = new THREE.Vector3(0, 5, 13).applyQuaternion(p.car.quaternion);
        if(p.input.nitro_on) cO.add(new THREE.Vector3((Math.random()-0.5)*0.3, (Math.random()-0.5)*0.3, 0));
        p.cam.position.copy(p.car.position).add(cO); p.cam.lookAt(p.car.position);
        
        // SPEED SYNC TO CONTROLLER (10Hz)
        if(Math.floor(performance.now()) % 10 < 2) {
            p.conn.send({type: 'spd', val: Math.round(p.speed * 115)});
        }
        
        renderer.render(scene, p.cam);
    });
}

function join() {
    const tid = document.getElementById('target').value.toUpperCase().trim();
    if(!tid) return;
    const cn = peer.connect(tid);
    cn.on('open', () => {
        window.activeConn = cn; document.getElementById('setup').style.display='none'; document.getElementById('pad').style.display='block';
        if(audioCtx.state === 'suspended') audioCtx.resume();
        if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
        initCtrl();
    });
    // DATA FEEDBACK FROM TV
    cn.on('data', d => { if(d.type === 'spd') document.getElementById('spd').innerText = d.val; });
}

function initCtrl() {
    const nB = document.getElementById('nitro-btn'); let isCD = false, isN = false;
    const sync = () => window.activeConn.send({...keys, nitro_on: isN});
    const trigN = (e) => {
        e.preventDefault(); if(isCD || isN) return;
        isN = true; nB.classList.add('active_n'); nB.innerText = "POWER"; sync();
        setTimeout(() => {
            isN = false; isCD = true; nB.classList.remove('active_n'); nB.classList.add('cd'); nB.innerText = "WAIT"; sync();
            setTimeout(() => { isCD = false; nB.classList.remove('cd'); nB.innerText = "NITRO"; }, 5000);
        }, 3000);
    };
    const bnd = (id, k) => {
        const el = document.getElementById(id);
        const s = (e) => { e.preventDefault(); keys[k]=1; sync(); el.classList.add('act'); };
        const n = (e) => { e.preventDefault(); keys[k]=0; sync(); el.classList.remove('act'); };
        el.addEventListener('touchstart', s, {passive: false}); el.addEventListener('touchend', n);
        el.addEventListener('mousedown', s); el.addEventListener('mouseup', n);
    };
    bnd('u','u'); bnd('d','d'); bnd('l','l'); bnd('r','r');
    nB.addEventListener('touchstart', trigN, {passive: false}); nB.addEventListener('mousedown', trigN);
}
</script>
</body>
</html>
