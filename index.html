<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLOCK DRIFT V1.5</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; touch-action: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #222 0%, #000 100%); color: #fff; text-align: center; z-index: 100; position: relative; }
        .btn { padding: 20px; width: 300px; margin: 15px; font-weight: bold; cursor: pointer; border: 4px solid #fff; background: transparent; color: #fff; font-family: 'Orbitron'; text-transform: uppercase; border-radius: 12px; }

        #host-ui { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 10; }
        #host-info { position: absolute; top: 20px; right: 20px; background: #fff; color: #000; padding: 12px 25px; border-radius: 12px; font-weight: 900; pointer-events: auto; border: 3px solid #ff0055; }
        #fps { position: absolute; bottom: 10px; left: 10px; color: #00ff00; font-size: 0.9rem; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; }

        #ctrl-view { display: none; height: 100vh; width: 100vw; background: #050505; position: relative; }
        #dash { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: #111; border: 3px solid #444; padding: 10px; text-align: center; border-radius: 20px; width: 220px; }
        #spd { color: #fff; font-size: 3.5rem; display: block; line-height: 1; }
        
        /* POSISI NITRO & STEERING KIRI */
        .left-controls { position: absolute; bottom: 25px; left: 25px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        #nitro-btn { width: 110px; height: 110px; background: #ff0055; border: 4px solid #fff; border-radius: 50%; color: #fff; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 1rem; box-shadow: 0 6px 0 #80002b; }
        #nitro-btn.active_n { background: #00f2ff; box-shadow: 0 0 30px #00f2ff; color: #000; transform: translateY(6px); box-shadow: none; }
        .s-grp { display: flex; gap: 15px; }
        .btn-s { width: 110px; height: 110px; background: #111; color: #fff; border-radius: 50%; border: 4px solid #444; display: flex; align-items: center; justify-content: center; font-size: 3rem; box-shadow: 0 8px 0 #000; }

        /* ANALOG CAM DI TENGAH */
        #cam-joy { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 180px; height: 180px; background: rgba(255,255,255,0.03); border: 2px dashed rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #stick { width: 80px; height: 80px; background: radial-gradient(circle, #fff 0%, #aaa 100%); border-radius: 50%; box-shadow: 0 0 25px rgba(255,255,255,0.4); position: absolute; transition: transform 0.05s linear; border: 4px solid #444; }

        /* PEDAL KANAN */
        .p-grp { position: absolute; bottom: 25px; right: 25px; display: flex; flex-direction: column; gap: 15px; }
        .pedal { width: 130px; border-radius: 20px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 4px solid #333; }
        .gas { height: 260px; background: linear-gradient(to bottom, #008800, #004400); font-size: 1.8rem; }
        .rem { height: 110px; background: linear-gradient(to bottom, #880000, #440000); font-size: 1.2rem; }
        
        .act { filter: brightness(2); transform: translateY(6px); box-shadow: none !important; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="letter-spacing: 8px; font-size: 3.5rem; margin: 0;">BLOCK DRIFT</h1>
    <p style="color: #ff0055;">V1.5 - STABLE TV PRO</p>
    <button class="btn" onclick="sys('host')">TV MODE</button>
    <button class="btn" onclick="sys('ctrl')">HP CONTROLLER</button>
</div>

<div id="host-ui">
    <div id="host-info">CODE: <span id="id-val" style="color:#ff0055">...</span></div>
    <div id="fps">FPS: --</div>
</div>

<div id="ctrl-view">
    <div id="setup" style="padding-top: 100px; text-align: center;">
        <input type="text" id="target" placeholder="KODE TV" maxlength="7" style="padding:20px; font-size:1.5rem; width:80%; text-align:center; border-radius:15px; border:3px solid #fff; background:#000; color:#fff; font-family:'Orbitron';">
        <br><br><button class="btn" onclick="join()">CONNECT</button>
    </div>
    <div id="pad" style="display:none; width:100%; height:100%;">
        <div id="dash"><span id="spd">0</span><small>KM/H</small></div>
        
        <div class="left-controls">
            <div id="nitro-btn">NITRO</div>
            <div class="s-grp">
                <div class="btn-s" id="l">←</div>
                <div class="btn-s" id="r">→</div>
            </div>
        </div>

        <div id="cam-joy"><div id="stick"></div></div>

        <div class="p-grp">
            <div class="pedal gas" id="u">GAS</div>
            <div class="pedal rem" id="d">BRAKE</div>
        </div>
    </div>
</div>

<script>
let players=[], scene, renderer, peer, audioCtx, keys={u:0,d:0,l:0,r:0,nitro_on:false,cx:0,cy:0};
const myId = 'HAM-' + Math.floor(100+Math.random()*899);

function sys(mode) {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('menu').style.display='none';
    peer = new Peer(myId);
    peer.on('open', id => {
        if(mode==='host') {
            document.getElementById('id-val').innerText=id;
            document.getElementById('host-ui').style.display='block';
            initHost();
        } else document.getElementById('ctrl-view').style.display='block';
    });
}

function initHost() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x010101);
    renderer = new THREE.WebGLRenderer({ antialias: false, precision: 'mediump' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const roadTex = new THREE.MeshBasicMaterial({color: 0x111111});
    const road = new THREE.Mesh(new THREE.PlaneGeometry(10000,10000), roadTex);
    road.rotation.x = -Math.PI/2; scene.add(road);

    // BUILDINGS (OPTIMIZED)
    const inst = new THREE.InstancedMesh(new THREE.BoxGeometry(10,1,10), new THREE.MeshStandardMaterial({color:0x0a0a0a}), 500);
    const dmy = new THREE.Object3D();
    for(let i=0; i<500; i++){
        let x=(Math.random()-0.5)*2500, z=(Math.random()-0.5)*2500;
        if(Math.abs(x)<60) x+=80*(x>0?1:-1);
        dmy.position.set(x,0,z); dmy.scale.set(1+Math.random()*2, 10+Math.random()*60, 1+Math.random()*2);
        dmy.updateMatrix(); inst.setMatrixAt(i, dmy.matrix);
    }
    scene.add(inst);

    let frames=0;
    peer.on('connection', cn => {
        const p = { 
            conn: cn, speed: 0, steer: 0, camX:0, camY:0,
            car: createCar(), 
            cam: new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 3000), 
            input: {u:0,d:0,l:0,r:0,nitro_on:false,cx:0,cy:0} 
        };
        const osc = audioCtx.createOscillator(); const gn = audioCtx.createGain();
        osc.type = 'square'; gn.gain.value = 0.05; osc.connect(gn); gn.connect(audioCtx.destination); osc.start();
        p.audio = {osc, gn}; scene.add(p.car); players.push(p);
        cn.on('data', d => p.input = d);
        if(players.length === 1) renderLoop();
    });
    setInterval(() => { document.getElementById('fps').innerText = "FPS: "+frames; frames=0; }, 1000);
}

function createCar() {
    const g = new THREE.Group();
    const b = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 4), new THREE.MeshStandardMaterial({color: 0xff0055}));
    b.position.y = 0.6; g.add(b);
    return g;
}

function renderLoop() {
    requestAnimationFrame(renderLoop);
    players.forEach(p => {
        let n = p.input.nitro_on ? 2.6 : 1.0;
        if(p.input.u) p.speed = Math.min(p.speed + 0.02, 1.8 * n); else p.speed *= 0.98;
        if(p.input.d) p.speed *= 0.8;
        
        let ts = 0; if(p.input.l) ts = 0.048; if(p.input.r) ts = -0.048;
        p.steer += (ts - p.steer) * 0.14;
        p.car.translateZ(-p.speed);
        if(Math.abs(p.speed) > 0.05) p.car.rotation.y += p.steer * Math.min(p.speed, 1.2);

        p.audio.osc.frequency.setTargetAtTime(30 + (p.speed * 45), audioCtx.currentTime, 0.1);

        // ORBIT CAM LOGIC
        p.camX += (p.input.cx * 0.06); p.camY += (p.input.cy * 0.04);
        p.camX *= 0.94; p.camY *= 0.94; // Auto-center

        let camPos = new THREE.Vector3(0, 5, 12);
        camPos.applyAxisAngle(new THREE.Vector3(0,1,0), p.camX);
        camPos.applyAxisAngle(new THREE.Vector3(1,0,0), p.camY);
        camPos.applyQuaternion(p.car.quaternion);

        p.cam.position.copy(p.car.position).add(camPos);
        p.cam.lookAt(p.car.position);
        
        if(Date.now() % 4 === 0) p.conn.send({type:'spd', val: Math.round(p.speed*115)});
        renderer.render(scene, p.cam);
    });
}

function join() {
    const tid = document.getElementById('target').value.toUpperCase().trim();
    peer.connect(tid).on('open', function() {
        window.activeConn = this;
        document.getElementById('setup').style.display='none';
        document.getElementById('pad').style.display='block';
        initCtrl();
        this.on('data', d => { if(d.type==='spd') document.getElementById('spd').innerText = d.val; });
    });
}

function initCtrl() {
    const joy = document.getElementById('cam-joy'), stick = document.getElementById('stick');
    const sync = () => window.activeConn.send({...keys});
    
    joy.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = joy.getBoundingClientRect();
        const touch = e.touches[0];
        let x = touch.clientX - (rect.left + rect.width/2);
        let y = touch.clientY - (rect.top + rect.height/2);
        const dist = Math.min(Math.sqrt(x*x + y*y), 65);
        const angle = Math.atan2(y, x);
        x = Math.cos(angle) * dist; y = Math.sin(angle) * dist;
        stick.style.transform = `translate(${x}px, ${y}px)`;
        keys.cx = x / 65; keys.cy = y / 65; sync();
    });
    joy.addEventListener('touchend', () => {
        stick.style.transform = `translate(0px, 0px)`;
        keys.cx = 0; keys.cy = 0; sync();
    });

    const bnd = (id, k) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[k]=1; sync(); el.classList.add('act'); });
        el.addEventListener('touchend', () => { keys[k]=0; sync(); el.classList.remove('act'); });
    };
    bnd('u','u'); bnd('d','d'); bnd('l','l'); bnd('r','r');
    
    document.getElementById('nitro-btn').addEventListener('touchstart', (e) => {
        e.preventDefault(); keys.nitro_on = true; sync();
        document.getElementById('nitro-btn').classList.add('active_n');
        setTimeout(() => { keys.nitro_on = false; sync(); document.getElementById('nitro-btn').classList.remove('active_n'); }, 2500);
    });
}
</script>
</body>
</html>
