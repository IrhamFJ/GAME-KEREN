<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IRHAM FAJRI GTA V2.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --red-btn: #a00000; --red-active: #ff0000; }
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; outline: none; margin: 0; padding: 0; }
        body { font-family: 'Arial Black', sans-serif; background: #000; overflow: hidden; touch-action: none; color: #fff; }
        
        /* MENU UTAMA */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(45deg, #1a1a1a, #000); }
        .btn { padding: 20px 50px; border: none; background: #fff; color: #000; cursor: pointer; font-weight: 900; margin: 15px; width: 320px; border-radius: 50px; font-size: 1.2rem; text-transform: uppercase; transition: 0.2s; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }
        .btn-red { background: var(--red-btn); color: white; }
        .btn:active { transform: scale(0.95); }
        
        #ui-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; display: none; }
        .kode-box { background: rgba(0,0,0,0.8); color: #00ff00; padding: 15px 25px; border-radius: 10px; font-family: monospace; font-size: 1.8rem; border: 2px solid #00ff00; }

        /* --- CONTROLLER LAYOUT (HP) --- */
        #ctrl-view { display: none; height: 100vh; width: 100vw; background: #111; position: relative; }
        #setup-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 10; }
        #target-id { padding: 20px; text-align: center; border: 2px solid #444; background: #222; color: #fff; width: 280px; font-size: 1.8rem; border-radius: 15px; margin-bottom: 20px; text-transform: uppercase; }

        #game-pad { display: none; width: 100%; height: 100%; position: relative; }
        .gp-btn { position: absolute; background: var(--red-btn); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #500; font-size: 0.9rem; }
        .active-btn { background: var(--red-active) !important; box-shadow: 0 0 15px var(--red-active); }

        /* Left Side */
        #btn-lt { width: 60px; height: 40px; top: 10px; left: 10px; border-radius: 10px; }
        #btn-lb { width: 60px; height: 40px; top: 60px; left: 10px; border-radius: 10px; }
        #l-stick-ctn { position: absolute; bottom: 20px; left: 40px; width: 140px; height: 140px; background: #222; border-radius: 50%; border: 2px solid #333; }
        
        /* Right Side */
        #btn-rt { width: 60px; height: 40px; top: 10px; right: 10px; border-radius: 10px; }
        #btn-rb { width: 60px; height: 40px; top: 60px; right: 10px; border-radius: 10px; }
        #r-stick-ctn { position: absolute; bottom: 20px; right: 40px; width: 140px; height: 140px; background: #222; border-radius: 50%; border: 2px solid #333; }
        
        /* Face Buttons */
        .face-grid { position: absolute; top: 40px; right: 80px; display: grid; grid-template-areas: ". Y ." "X . B" ". A ."; gap: 10px; }
        .f-btn { width: 45px; height: 45px; position: static; }
        
        .stick-head { position: absolute; top: 25%; left: 25%; width: 50%; height: 50%; background: #eee; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
        
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="font-size: 3.5rem; font-style: italic; color: #ff0000; text-shadow: 3px 3px #fff;">IRHAM FAJRI GTA</h1>
        <p style="letter-spacing: 10px; margin-bottom: 40px; font-size: 0.8rem;">V2.0 PREMIUM STABLE</p>
        <button class="btn" onclick="preStart('screen')">HOST TV / PC</button>
        <button class="btn btn-red" onclick="preStart('controller')">JOIN PLAYER (HP)</button>
    </div>

    <div id="ui-overlay"><div class="kode-box">ID: <span id="peer-id-text">...</span></div></div>

    <div id="ctrl-view">
        <div id="setup-ui">
            <input type="text" id="target-id" placeholder="KODE TV">
            <button class="btn btn-red" onclick="connectToServer()">CONNECT GAME</button>
        </div>
        <div id="game-pad">
            <div class="gp-btn" id="btn-lt">LT</div><div class="gp-btn" id="btn-lb">LB</div>
            <div class="gp-btn" id="btn-rt">RT</div><div class="gp-btn" id="btn-rb">RB</div>
            <div class="face-grid">
                <div class="gp-btn f-btn" id="btn-y" style="grid-area:Y">Y</div>
                <div class="gp-btn f-btn" id="btn-x" style="grid-area:X">X</div>
                <div class="gp-btn f-btn" id="btn-b" style="grid-area:B">B</div>
                <div class="gp-btn f-btn" id="btn-a" style="grid-area:A">A</div>
            </div>
            <div id="l-stick-ctn"><div class="stick-head" id="l-head"></div></div>
            <div id="r-stick-ctn"><div class="stick-head" id="r-head"></div></div>
        </div>
    </div>

    <script>
        let players = [], scene, renderer, peer, clock;
        let currentState = { lX:0, lY:0, rX:0, rY:0, A:0, B:0, X:0, Y:0 };
        const myCustomId = 'IRHAM-' + Math.floor(1000 + Math.random() * 9000);

        function goFull() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
        }

        function preStart(type) {
            document.getElementById('menu').style.display = 'none';
            goFull(); 
            peer = new Peer(myCustomId);
            if(type === 'screen') {
                document.getElementById('ui-overlay').style.display = 'block';
                document.getElementById('peer-id-text').innerText = myCustomId;
                initWorld();
            } else {
                document.getElementById('ctrl-view').style.display = 'block';
                setupControls();
            }
        }

        function initWorld() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 160);

            renderer = new THREE.WebGLRenderer({ antialias: false, precision: "lowp" });
            renderer.setPixelRatio(1);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const amb = new THREE.AmbientLight(0xffffff, 0.8); scene.add(amb);
            const dir = new THREE.DirectionalLight(0xffffff, 1); dir.position.set(5, 10, 5); scene.add(dir);

            const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshLambertMaterial({color: 0x333333}));
            ground.rotation.x = -Math.PI/2; scene.add(ground);
            scene.add(new THREE.GridHelper(1000, 60, 0x000000, 0x444444));

            for(let i=0; i<70; i++) {
                const h = Math.random()*25 + 5;
                const b = new THREE.Mesh(new THREE.BoxGeometry(8, h, 8), new THREE.MeshLambertMaterial({color: 0x555555}));
                b.position.set((Math.random()-0.5)*300, h/2, (Math.random()-0.5)*300);
                scene.add(b);
            }

            peer.on('connection', conn => {
                const pID = players.length + 1;
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.4, 0.8, 2, 8), new THREE.MeshLambertMaterial({color: pID==1?0x007bff:0xff3333}));
                body.position.y = 1; group.add(body);
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshLambertMaterial({color: 0xffdbac}));
                head.position.y = 1.8; group.add(head);
                
                const p = { conn, mesh: group, cam: new THREE.PerspectiveCamera(70, 1, 0.1, 200), input: {...currentState}, walk: 0 };
                group.position.set(pID==1?3:-3, 0, 0);
                scene.add(group); players.push(p);
                conn.on('data', d => p.input = d);
                if(players.length === 1) { clock = new THREE.Clock(); animate(); }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const isSplit = players.length > 1;

            players.forEach((p, i) => {
                const {lX, lY, rX, rY} = p.input;
                // Move
                const move = new THREE.Vector3(lX, 0, -lY).applyEuler(p.mesh.rotation);
                p.mesh.position.add(move.multiplyScalar(7 * dt));
                // Rotate
                p.mesh.rotation.y -= rX * 2 * dt;
                // Anim
                if(lX || lY) { p.walk += dt * 12; p.mesh.position.y = Math.abs(Math.sin(p.walk)) * 0.15; }

                const offset = new THREE.Vector3(0, 4, -8).applyMatrix4(p.mesh.matrixWorld);
                p.cam.position.lerp(offset, 0.2);
                p.cam.lookAt(p.mesh.position.x, p.mesh.position.y + 1.5, p.mesh.position.z);

                const w = window.innerWidth, h = window.innerHeight;
                if(isSplit) {
                    p.cam.aspect = w/(h/2); p.cam.updateProjectionMatrix();
                    renderer.setScissorTest(true);
                    const rect = i==0 ? [0, h/2, w, h/2] : [0, 0, w, h/2];
                    renderer.setViewport(...rect); renderer.setScissor(...rect);
                } else {
                    p.cam.aspect = w/h; p.cam.updateProjectionMatrix();
                    renderer.setScissorTest(false);
                    renderer.setViewport(0, 0, w, h);
                }
                renderer.render(scene, p.cam);
            });
        }

        function setupControls() {
            const send = () => { if(window.conn) window.conn.send(currentState); };
            const bindAnalog = (id, headId, prefix) => {
                const el = document.getElementById(id), head = document.getElementById(headId);
                const move = (e) => {
                    const t = e.touches[0], r = el.getBoundingClientRect(), rad = el.offsetWidth/2;
                    let dx = t.clientX - (r.left + rad), dy = t.clientY - (r.top + rad);
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist > rad) { dx *= rad/dist; dy *= rad/dist; }
                    head.style.transform = `translate(${dx}px, ${dy}px)`;
                    currentState[prefix+'X'] = dx/rad; currentState[prefix+'Y'] = dy/rad;
                    send();
                };
                el.addEventListener('touchmove', e => { e.preventDefault(); move(e); });
                el.addEventListener('touchend', () => { head.style.transform = 'translate(0,0)'; currentState[prefix+'X']=0; currentState[prefix+'Y']=0; send(); });
            };
            bindAnalog('l-stick-ctn', 'l-head', 'l');
            bindAnalog('r-stick-ctn', 'r-head', 'r');
            
            ['a','b','x','y','lt','lb','rt','rb'].forEach(id => {
                const el = document.getElementById('btn-'+id);
                el.addEventListener('touchstart', (e) => { e.preventDefault(); el.classList.add('active-btn'); currentState[id.toUpperCase()]=1; send(); if(navigator.vibrate) navigator.vibrate(15); });
                el.addEventListener('touchend', () => { el.classList.remove('active-btn'); currentState[id.toUpperCase()]=0; send(); });
            });
        }

        function connectToServer() {
            const id = document.getElementById('target-id').value.toUpperCase().trim();
            if(!id) return;
            window.conn = peer.connect(id);
            window.conn.on('open', () => { 
                goFull();
                document.getElementById('setup-ui').style.display='none'; 
                document.getElementById('game-pad').style.display='block'; 
            });
        }
    </script>
</body>
</html>
