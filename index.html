<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HAM_CITY ULTIMATE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00ea; --neon-green: #39ff14; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; overflow: hidden; touch-action: none; }
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; z-index: 100; background: #000; }
        .btn { padding: 12px 30px; border: 2px solid var(--neon-blue); color: white; background: none; cursor: pointer; letter-spacing: 2px; font-weight: bold; margin: 8px; width: 220px; text-transform: uppercase; border-radius: 4px; font-size: 0.9rem; }
        .btn:active { transform: scale(0.95); background: var(--neon-blue); color: #000; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 1000; }
        .p-label { position: absolute; background: rgba(0,0,0,0.85); padding: 10px 20px; border: 2px solid var(--neon-blue); font-size: 1.1rem; font-family: monospace; border-radius: 8px; pointer-events: auto; top: 15px; right: 15px; }
        #ctrl-view { display: none; flex-direction: column; align-items: center; justify-content: flex-start; height: 100vh; background: #050505; padding-top: 30px; box-sizing: border-box; }
        .stier { width: 130px; height: 130px; border: 6px double #333; border-top: 6px solid var(--neon-blue); border-radius: 50%; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0,243,255,0.1); }
        #target-id { margin: 10px; padding: 12px; text-align: center; background: #111; border: 2px solid #444; color: var(--neon-blue); width: 80%; max-width: 260px; font-size: 1.3rem; border-radius: 8px; outline: none; -webkit-user-select: text; user-select: text; }
        #target-id:focus { border-color: var(--neon-blue); background: #1a1a1a; }
        .nitro-hint { margin-top: auto; padding-bottom: 30px; color: var(--neon-blue); font-size: 0.8rem; opacity: 0.6; letter-spacing: 1px; pointer-events: none; }
        #landscape-warn { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #600; color: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }
        @media (orientation: portrait) { #ctrl-view { display: none !important; } #landscape-warn { display: flex; } }
    </style>
</head>
<body>

    <div id="landscape-warn"><h1>🔄</h1><h2>MIRINGKAN HP</h2><p>Gunakan mode landscape untuk setir mobil.</p></div>

    <div id="menu">
        <h1 style="color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin:0;">HAM_CITY</h1>
        <p style="opacity:0.4; font-size: 0.7rem; letter-spacing: 5px; margin-bottom: 30px;">ULTIMATE ENGINE</p>
        <button class="btn" onclick="preStart('screen')">HOST CITY (PC)</button>
        <button class="btn" onclick="preStart('controller')" style="border-color: var(--neon-pink);">JOIN DRIVE (HP)</button>
    </div>

    <div id="ui-overlay">
        <div class="p-label">CODE: <span id="peer-id-text" style="color:var(--neon-blue)">...</span></div>
    </div>

    <div id="ctrl-view">
        <div id="wheel" class="stier"></div>
        <input type="text" id="target-id" placeholder="MASUKKAN KODE" spellcheck="false" autocomplete="off">
        <button class="btn" style="width: 180px; border-color: var(--neon-green);" onclick="connectToServer()">START</button>
        <div class="nitro-hint">HOLD ANYWHERE FOR NITRO</div>
    </div>

    <script>
        let players = [], scene, renderer, clock, peer, isNitro = false;
        const myCustomId = 'HAM-' + Math.floor(10000 + Math.random() * 90000);

        function preStart(type) {
            document.getElementById('menu').style.display = 'none';
            peer = new Peer(myCustomId);
            if(type === 'screen') {
                document.getElementById('ui-overlay').style.display = 'block';
                document.getElementById('peer-id-text').innerText = myCustomId;
                initWorld();
            } else {
                document.getElementById('ctrl-view').style.display = 'flex';
                setupControllerInput();
            }
        }

        function createCar(color) {
            const g = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 3), new THREE.MeshPhongMaterial({ color }));
            b.position.y = 0.3;
            const c = new THREE.Mesh(new THREE.SphereGeometry(0.6, 12, 12, 0, 6.3, 0, 1.6), new THREE.MeshPhongMaterial({ color: 0x000, transparent: true, opacity: 0.7 }));
            c.scale.set(1, 0.7, 1.5); c.position.set(0, 0.5, 0.2);
            g.add(b, c);
            [[-0.8, 1], [0.8, 1], [-0.8, -1], [0.8, -1]].forEach(p => {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.3, 10), new THREE.MeshPhongMaterial({color:0x111}));
                w.rotation.z = Math.PI/2; w.position.set(p[0], 0.1, p[1]);
                const pk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.32, 6), new THREE.MeshPhongMaterial({color, emissive: color}));
                pk.rotation.z = Math.PI/2; pk.position.copy(w.position);
                g.add(w, pk);
            });
            return g;
        }

        function initWorld() {
            scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0, 0.007);
            clock = new THREE.Clock();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            scene.add(new THREE.GridHelper(2000, 100, 0x00f3ff, 0x111111));
            for(let i=0; i<300; i++) {
                const h = Math.random()*30+10;
                const b = new THREE.Mesh(new THREE.BoxGeometry(7, h, 7), new THREE.MeshPhongMaterial({color: 0x111, emissive: 0x001122}));
                b.position.set((Math.random()-0.5)*1500, h/2, (Math.random()-0.5)*1500);
                if(Math.abs(b.position.x) < 25) b.position.x += 50;
                scene.add(b);
            }
            peer.on('connection', conn => {
                if(players.length >= 2) return;
                const pID = players.length+1;
                const color = pID === 1 ? 0xff00ea : 0x39ff14;
                const p = {
                    conn, id: pID, nitro: false, tilt: 0, speed: 0, rot: 0,
                    car: createCar(color),
                    cam: new THREE.PerspectiveCamera(75, 1, 0.1, 3000)
                };
                p.car.position.set(pID*12, 0, 0);
                scene.add(p.car);
                players.push(p);
                conn.on('data', d => { p.tilt = d.tilt; p.nitro = d.nitro; });
                if(players.length === 1) loop();
            });
        }

        function loop() {
            requestAnimationFrame(loop);
            const h = window.innerHeight, w = window.innerWidth;
            renderer.setScissorTest(true);
            players.forEach((p, i) => {
                p.speed = THREE.MathUtils.lerp(p.speed, p.nitro?1.8:0.75, 0.05);
                p.rot -= p.tilt * 0.00085 * (p.speed*2.2);
                p.car.rotation.y = p.rot;
                p.car.translateZ(-p.speed);
                p.cam.aspect = w / (h / 2); p.cam.updateProjectionMatrix();
                const off = new THREE.Vector3(0, 3.5, 11).applyMatrix4(p.car.matrixWorld);
                p.cam.position.lerp(off, 0.12); p.cam.lookAt(p.car.position);
                const bottom = i === 0 ? h/2 : 0;
                renderer.setViewport(0, bottom, w, h/2); renderer.setScissor(0, bottom, w, h/2);
                renderer.render(scene, p.cam);
            });
        }

        function setupControllerInput() {
            window.addEventListener('touchstart', (e) => { 
                if(e.target.id !== 'target-id') { isNitro = true; if(navigator.vibrate) navigator.vibrate(20); }
            }, { passive: true });
            window.addEventListener('touchend', () => isNitro = false);
            window.addEventListener('touchcancel', () => isNitro = false);
        }

        function connectToServer() {
            const val = document.getElementById('target-id').value.toUpperCase().trim();
            if(!val) return;
            const conn = peer.connect(val);
            conn.on('open', () => {
                document.getElementById('ctrl-view').innerHTML = `<div class="stier" id="wheel"></div><h3 style="color:var(--neon-green)">DRIVE ACTIVE</h3>`;
                window.addEventListener('deviceorientation', e => {
                    let tilt = Math.round(e.gamma || 0);
                    if(Math.abs(tilt) < 3) tilt = 0;
                    const wh = document.getElementById('wheel');
                    if(wh) wh.style.transform = `rotate(${tilt*2.5}deg)`;
                    conn.send({ tilt, nitro: isNitro });
                });
            });
        }
    </script>
</body>
</html>
