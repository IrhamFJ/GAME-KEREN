<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Tap 1v1 P2P - LEGO Style</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        :root { --p1: #ff4757; --p2: #2e86de; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1c40f; color: #2c3e50; text-align: center; margin: 0; overflow: hidden; touch-action: none; transition: background 0.4s; width: 100vw; height: 100vh; }
        
        @media screen and (orientation: portrait) {
            #monitor-screen.active {
                transform: rotate(90deg); transform-origin: center;
                width: 100vh !important; height: 100vw !important;
                position: fixed; top: 50%; left: 50%;
                margin-top: -50vw; margin-left: -50vh;
                display: flex !important;
            }
        }

        .screen { display: none; padding: 20px; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; box-sizing: border-box; position: absolute; top: 0; left: 0; }
        .active { display: flex; }
        
        body.skin-classic { background: #f1c40f; }
        body.skin-space { background: #2c3e50; color: #ecf0f1; }
        body.skin-forest { background: #27ae60; }

        button { padding: 15px 30px; font-size: 1rem; cursor: pointer; border: 4px solid #2c3e50; border-radius: 15px; margin: 5px; transition: 0.1s; background: #ecf0f1; color: #2c3e50; font-weight: 900; text-transform: uppercase; box-shadow: 4px 4px 0px #2c3e50; -webkit-tap-highlight-color: transparent; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        button:active:not(:disabled) { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #2c3e50; }
        .skin-btn { padding: 8px 12px; font-size: 0.7rem; margin: 3px; background: #fff; }
        
        input { padding: 12px; border: 4px solid #2c3e50; border-radius: 12px; width: 220px; font-size: 1.1rem; margin-bottom: 10px; text-align: center; background: #fff; font-weight: bold; outline: none; }
        input.error { border-color: #ff4757; animation: shake 0.3s; box-shadow: 0 0 10px #ff4757; }

        #room-id-display { background: #fff; color: #2c3e50; padding: 15px 30px; border: 5px solid #2c3e50; border-radius: 20px; font-size: 3.5rem; font-weight: 900; margin: 10px 0; letter-spacing: 5px; box-shadow: 8px 8px 0px #c0392b; }
        #track { display: none; width: 85%; height: 110px; background: #2c3e50; border: 6px solid #fff; border-radius: 55px; position: relative; margin: 25px 0; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .bar { height: 100%; transition: width 0.08s ease-out; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; color: white; text-shadow: 2px 2px #000; overflow: hidden; position: relative; }
        
        .ping-dot { width: 12px; height: 12px; background: #7f8c8d; border-radius: 50%; border: 2px solid #fff; position: absolute; top: 10px; transition: 0.3s; }
        #ping-p1 { left: 15px; }
        #ping-p2 { right: 15px; }

        #status-text { font-size: 2.2rem; color: #fff; text-transform: uppercase; margin: 15px 0; min-height: 1.2em; text-shadow: 4px 4px #c0392b; -webkit-text-stroke: 1.5px #2c3e50; }
        #round-info { display: none; font-size: 1.3rem; font-weight: 900; background: #fff; color: #2c3e50; padding: 8px 25px; border-radius: 50px; border: 3px solid #2c3e50; margin-bottom: 10px; }
        #speed-alert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #fff; color: #2c3e50; padding: 25px 50px; border: 8px solid #2c3e50; border-radius: 30px; font-size: 3rem; font-weight: 900; z-index: 5000; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.4); pointer-events: none; white-space: nowrap; box-shadow: 15px 15px 0 rgba(0,0,0,0.3); }
        #speed-alert.show { transform: translate(-50%, -50%) scale(1); }

        .tap-area { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none; font-size: 5rem; font-weight: 900; color: white; user-select: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shaking { animation: shake 0.1s infinite; }
    </style>
</head>
<body class="skin-classic">

    <audio id="bgm-menu" loop preload="auto">
        <source src="https://image2url.com/r2/default/audio/1775290560696-3795209f-6e46-433c-a94c-18ac02c047a4.mp3" type="audio/mpeg">
    </audio>
    <audio id="bgm-battle" loop preload="auto">
        <source src="https://image2url.com/r2/default/audio/1775290622313-a7846eca-967a-4dcc-88dd-cb8e330cf6a6.mp3" type="audio/mpeg">
    </audio>

    <div id="menu-screen" class="screen active">
        <h1 style="font-size: 2.5rem; margin-bottom: 5px;">TAPTAP 1V1</h1>
        <div style="margin-bottom: 15px;">
            <p style="font-weight: bold; font-size: 0.8rem; margin: 5px;">PLAYER NAME:</p>
            <input type="text" id="user-name" placeholder="YOUR NAME..." maxlength="10">
            <div style="margin-top: 5px;">
                <button class="skin-btn" onclick="setSkin('classic')">Classic</button>
                <button class="skin-btn" onclick="setSkin('space')">Space</button>
                <button class="skin-btn" onclick="setSkin('forest')">Forest</button>
            </div>
        </div>
        <button id="btn-monitor" onclick="startMonitorMode()">START MONITOR</button>
        <div style="margin: 10px 0; font-weight: bold; opacity: 0.6;">━━━━ OR ━━━━</div>
        <input type="text" id="join-id" placeholder="ROOM CODE" maxlength="5">
        <button id="btn-join" onclick="checkNameBefore(initController)">JOIN BATTLE</button>
    </div>

    <div id="monitor-screen" class="screen">
        <div id="round-info">ROUND 1 | 0-0</div>
        <div id="room-id-display">.....</div>
        <h3 id="status-text">WAITING...</h3>
        <button id="btn-add-bot" onclick="addBot()" style="margin-bottom: 10px; background: #9b59b6; color: white;">ADD BOT</button>
        <div id="track">
            <div id="bar-p1" class="bar" style="width: 50%; background: var(--p1);">
                <div id="ping-p1" class="ping-dot"></div>
                <b id="name-p1">P1</b>
            </div>
            <div id="bar-p2" class="bar" style="width: 50%; background: var(--p2);">
                <div id="ping-p2" class="ping-dot"></div>
                <b id="name-p2">P2</b>
            </div>
        </div>
        <div id="speed-alert">SO FAST!!</div>
    </div>

    <div id="controller-screen" class="screen" style="padding:0;">
        <button id="btn-tap" class="tap-area" disabled>CONNECTING...</button>
    </div>

    <script>
        let peer = null, players = { p1: null, p2: null }, playerNames = { p1: "P1", p2: "P2" };
        let score = 50, gameActive = false, currentSkin = 'classic', p1Wins = 0, p2Wins = 0, currentRound = 1;
        let isBotMode = false, botInterval = null, botTapsInRound = 0;
        let commentaryLock = false, tapHistory = { p1: [], p2: [] }, audioCtx = null;
        const menuAudio = document.getElementById('bgm-menu'), battleAudio = document.getElementById('bgm-battle');

        async function lockOrientation() {
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                    if (screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape').catch(() => {});
                }
            } catch (err) {}
        }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        async function startMonitorMode() {
            if (peer) return;
            document.getElementById('btn-monitor').disabled = true;
            initAudio(); await lockOrientation();
            menuAudio.play().catch(()=>{});
            initMonitor();
        }

        function initMonitor() {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            let roomID = "";
            for(let i=0; i<5; i++) roomID += chars.charAt(Math.floor(Math.random() * chars.length));
            showScreen('monitor-screen');
            peer = new Peer(roomID);
            peer.on('open', id => document.getElementById('room-id-display').innerText = id);
            peer.on('connection', conn => {
                if (isBotMode) return;
                conn.on('open', () => {
                    let role = !players.p1 ? "p1" : (!players.p2 ? "p2" : null);
                    if (role) { 
                        players[role] = conn; 
                        conn.send({ type: 'init', role, skin: currentSkin }); 
                        document.getElementById('btn-add-bot').style.display = 'none';
                    }
                });
                conn.on('data', data => {
                    if (data.type === 'join_name') {
                        playerNames[data.role] = data.name || data.role.toUpperCase();
                        document.getElementById('name-' + data.role).innerText = playerNames[data.role].toUpperCase();
                        if (players.p1 && players.p2) startRoundSequence();
                        else document.getElementById('status-text').innerText = "1 MORE PLAYER...";
                    }
                    if (data.type === 'tap' && gameActive) handleTap(data.role, data.t);
                });
                conn.on('close', () => location.reload());
            });
        }

        function addBot() {
            if (players.p1 && players.p2) return;
            isBotMode = true;
            document.getElementById('btn-add-bot').style.display = 'none';
            playerNames.p2 = "BOT-LEGO";
            document.getElementById('name-p2').innerText = "BOT-LEGO";
            document.getElementById('ping-p2').style.background = '#2ecc71'; 
            if (players.p1) startRoundSequence();
        }

        function botLogic() {
            if (!gameActive || !isBotMode) return;
            let staminaPenalty = Math.floor(botTapsInRound / 10) * 8; 
            let baseInterval = Math.floor(Math.random() * 100) + 120;
            let finalDelay = baseInterval + staminaPenalty;
            if (Math.random() > 0.9) finalDelay -= 50;

            botInterval = setTimeout(() => {
                if (gameActive) {
                    botTapsInRound++;
                    handleTap('p2', Date.now());
                    botLogic();
                }
            }, finalDelay);
        }

        function handleTap(role, time) {
            const lat = Date.now() - time;
            const dot = document.getElementById('ping-' + role);
            if (dot) dot.style.background = lat < 60 ? '#2ecc71' : (lat < 160 ? '#f1c40f' : '#e74c3c');
            score += (role === 'p1' ? 2 : -2); 
            updateDisplay(); 
            checkSpeed(role);
        }

        function startRoundSequence() {
            gameActive = false; score = 50; commentaryLock = false; 
            botTapsInRound = 0; // RESET STAMINA BOT DISINI
            if (botInterval) clearTimeout(botInterval);
            document.getElementById('room-id-display').style.display = 'none';
            document.getElementById('track').style.display = 'none';
            document.getElementById('status-text').innerText = "ROUND " + currentRound;
            const ri = document.getElementById('round-info'); ri.style.display = 'block';
            ri.innerText = `ROUND ${currentRound} | ${p1Wins}-${p2Wins}`;
            
            speak("Round " + currentRound, true, () => {
                setTimeout(() => speak("Ready", true, () => {
                    setTimeout(() => {
                        speak("Go", true);
                        document.getElementById('status-text').innerText = "FIGHT!";
                        document.getElementById('track').style.display = 'flex';
                        gameActive = true; 
                        menuAudio.pause(); battleAudio.currentTime = 0; battleAudio.play().catch(()=>{});
                        if (isBotMode) setTimeout(botLogic, Math.random() * 200 + 250);
                    }, 800);
                }), 800);
            });
        }

        function updateDisplay() {
            document.getElementById('bar-p1').style.width = score + '%';
            document.getElementById('bar-p2').style.width = (100 - score) + '%';
            if (score >= 100 || score <= 0) {
                gameActive = false; battleAudio.pause();
                if (botInterval) clearTimeout(botInterval);
                let win = score >= 100 ? "p1" : "p2";
                win === "p1" ? p1Wins++ : p2Wins++;
                if (win === 'p2' && players.p1) players.p1.send({ type: 'punish' });
                if (win === 'p1' && players.p2) players.p2.send({ type: 'punish' });
                speak(playerNames[win] + " wins!", true);
                if (p1Wins === 2 || p2Wins === 2) {
                    setTimeout(() => { alert("GAME OVER! " + playerNames[win].toUpperCase()); location.reload(); }, 2000);
                } else { currentRound++; setTimeout(startRoundSequence, 3000); }
            }
        }

        function speak(t, main, cb) {
            if (main) window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.onend = () => cb && cb();
            window.speechSynthesis.speak(m);
        }

        function checkSpeed(role) {
            const now = Date.now(); tapHistory[role].push(now);
            tapHistory[role] = tapHistory[role].filter(t => now - t < 1000);
            if (tapHistory[role].length >= 8) {
                const a = document.getElementById('speed-alert'); a.innerText = playerNames[role] + " SO FAST!";
                a.classList.add('show'); setTimeout(() => a.classList.remove('show'), 1200);
                tapHistory[role] = [];
            }
        }

        function setSkin(s) {
            currentSkin = s; document.body.className = 'skin-' + s;
            const themes = { classic: ['#ff4757', '#2e86de'], space: ['#9b59b6', '#1abc9c'], forest: ['#e67e22', '#2ecc71'] };
            document.documentElement.style.setProperty('--p1', themes[s][0]);
            document.documentElement.style.setProperty('--p2', themes[s][1]);
            Object.values(players).forEach(p => p && p.send({ type: 'skin', skin: s }));
        }

        function checkNameBefore(fn) {
            const n = document.getElementById('user-name');
            if(!n.value.trim()) { n.classList.add('error'); setTimeout(()=>n.classList.remove('error'), 500); return; }
            fn();
        }

        function initController() {
            if(peer) return;
            const id = document.getElementById('join-id').value.trim().toUpperCase();
            const name = document.getElementById('user-name').value.trim();
            document.getElementById('btn-join').disabled = true;
            showScreen('controller-screen');
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(id);
                conn.on('open', () => {
                    initAudio();
                    conn.on('data', d => {
                        const b = document.getElementById('btn-tap');
                        if (d.type === 'init') {
                            updateBtn(b, d.role, d.skin);
                            conn.send({ type: 'join_name', role: d.role, name });
                            b.onpointerdown = (e) => { 
                                e.preventDefault(); initAudio();
                                conn.send({ type: 'tap', role: d.role, t: Date.now() }); 
                                if(navigator.vibrate) navigator.vibrate(40); 
                            };
                        }
                        if (d.type === 'skin') updateBtn(b, d.role, d.skin);
                        if (d.type === 'punish' && navigator.vibrate) navigator.vibrate([800, 200, 800]);
                    });
                });
                conn.on('error', () => { alert("ROOM NOT FOUND!"); location.reload(); });
            });
        }

        function updateBtn(b, r, s) {
            const themes = { classic: ['#ff4757', '#2e86de'], space: ['#9b59b6', '#1abc9c'], forest: ['#e67e22', '#2ecc71'] };
            b.style.background = r === 'p1' ? themes[s][0] : themes[s][1];
            b.innerText = "TAP!"; b.disabled = false;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
