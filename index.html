</body>
</html>
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BLOCK DRIFT V1.4 PRO</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; touch-action: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* MENU SYSTEM */
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #111 0%, #000 100%); color: #fff; text-align: center; z-index: 100; position: relative; }
        .btn { padding: 20px; width: 280px; margin: 12px; font-weight: bold; cursor: pointer; border: 4px solid #fff; background: transparent; color: #fff; font-family: 'Orbitron'; text-transform: uppercase; border-radius: 12px; transition: 0.2s; }
        .btn:active { background: #fff; color: #000; transform: scale(0.92); }

        /* HOST OVERLAY */
        #host-ui { position: absolute; width: 100%; height: 100%; pointer-events: none; display: none; }
        #waiting-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 1.8rem; text-align: center; text-shadow: 0 0 20px #00f2ff; }
        #host-info { position: absolute; top: 20px; right: 20px; background: #fff; color: #000; padding: 12px 25px; border-radius: 15px; font-weight: 900; pointer-events: auto; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        /* CONTROLLER UI */
        #ctrl-view { display: none; height: 100vh; width: 100vw; background: #050505; position: relative; }
        #dash { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #111; border: 3px solid #333; padding: 15px; text-align: center; border-radius: 25px; width: 220px; box-shadow: 0 10px 0 #000; }
        #spd { color: #fff; font-size: 3.5rem; display: block; line-height: 1; }
        
        #nitro-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 110px; height: 110px; background: #00f2ff; border: 5px solid #fff; border-radius: 50%; color: #000; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 0 0 30px rgba(0,242,255,0.6); }
        #nitro-btn:active { transform: translateX(-50%) scale(0.9); box-shadow: none; background: #fff; }
        
        .pedal-group { position: absolute; bottom: 30px; right: 25px; display: flex; flex-direction: column; gap: 15px; }
        .pedal { width: 110px; border-radius: 20px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 900; border: 4px solid rgba(255,255,255,0.1); }
        .gas { height: 200px; background: linear-gradient(to bottom, #006600, #003300); }
        .rem { height: 100px; background: linear-gradient(to bottom, #660000, #330000); }
        
        .steer-group { position: absolute; bottom: 30px; left: 25px; display: flex; gap: 20px; }
        .btn-s { width: 100px; height: 100px; background: #1a1a1a; color: #fff; border-radius: 50%; border: 4px solid #333; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; box-shadow: 0 8px 0 #000; }
        
        .active { filter: brightness(1.5); transform: translateY(5px); box-shadow: none !important; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 3.5rem; margin: 0; letter-spacing: 5px;">BLOCK DRIFT</h1>
    <p style="color: #00f2ff; font-size: 1.2rem; margin-bottom: 40px;">PRO EDITION V1.4</p>
    <button class="btn" onclick="setupPeer('host')">CREATE LOBBY (TV)</button>
    <button class="btn" onclick="setupPeer('ctrl')">JOIN RACE (HP)</button>
</div>

<div id="host-ui">
    <div id="waiting-msg" class="blink">WAITING FOR DRIVERS...<br><span style="font-size: 1rem; color: #666;">READY UP ON YOUR MOBILE DEVICE</span></div>
    <div id="host-info">LOBBY CODE: <span id="id-val" style="color:#0088ff">...</span></div>
</div>

<div id="ctrl-view">
    <div id="setup-screen" style="padding-top: 100px; text-align: center;">
        <input type="text" id="target-id" placeholder="ENTER CODE" maxlength="7" style="padding:20px; font-size:1.8rem; width:85%; max-width:350px; border:4px solid #fff; background:#000; color:#fff; font-family:'Orbitron'; text-align:center; border-radius:15px; text-transform:uppercase;"><br><br>
        <button class="btn" onclick="connectToHost()">IGNITION</button>
    </div>
    <div id="pad" style="display:none; width:100%; height:100%;">
        <div id="dash"><span id="spd">0</span><small style="color:#555">KM/H</small></div>
        <div id="nitro-btn">NITRO</div>
        <div class="steer-group"><div class="btn-s" id="l">←</div><div class="btn-s" id="r">→</div></div>
        <div class="pedal-group"><div class="pedal gas" id="u">GAS</div><div class="pedal rem" id="d">BRAKE</div></div>
    </div>
</div>

<script>
let players=[], scene, renderer, peer, audioCtx, keys={u:0,d:0,l:0,r:0,n:0}, isHost=false;
const myId = 'HAM-' + Math.floor(100+Math.random()*899);

// --- PEER & CONNECTIVITY ---
function setupPeer(mode) {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('menu').style.display='none';
    peer = new Peer(myId, { debug: 1 });
    
    peer.on('open', id => {
        if(mode==='host') {
            isHost=true; 
            document.getElementById('id-val').innerText=id;
            document.getElementById('host-ui').style.display='block';
            initThreeJS();
        } else {
            document.getElementById('ctrl-view').style.display='block';
        }
    });
}

function connectToHost() {
    const tid = document.getElementById('target-id').value.toUpperCase().trim();
    if(!tid) return;
    const conn = peer.connect(tid);
    conn.on('open', () => {
        window.activeConn = conn;
        document.getElementById('setup-screen').style.display='none';
        document.getElementById('pad').style.display='block';
        if(audioCtx.state === 'suspended') audioCtx.resume();
        setupControllerEvents();
    });
}

// --- ENGINE THREE.JS ---
function initThreeJS() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x020202);
    renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(1); // Anti-lag for 4K TVs
    document.body.appendChild(renderer.domElement);
    
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const grid = new THREE.GridHelper(10000, 300, 0x333333, 0x111111);
    scene.add(grid);

    // City Decoration
    for(let i=0; i<250; i++){
        const h = 15+Math.random()*70;
        const box = new THREE.Mesh(new THREE.BoxGeometry(12, h, 12), new THREE.MeshBasicMaterial({color: 0x151515 + Math.random()*0x111111}));
        box.position.set((Math.random()-0.5)*1500, h/2, (Math.random()-0.5)*1500);
        scene.add(box);
    }

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    peer.on('connection', conn => {
        document.getElementById('waiting-msg').style.display='none';
        const p = {
            conn, speed:0, 
            car: new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshBasicMaterial({color: Math.random()*0xffffff})),
            cam: new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000),
            input: {u:0,d:0,l:0,r:0,n:0}
        };
        
        // Sound System
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sawtooth'; gain.gain.value = 0.05;
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start();
        p.audio = { osc, gain };

        scene.add(p.car); players.push(p);
        conn.on('data', d => p.input = d);
        conn.on('close', () => { scene.remove(p.car); players = players.filter(it => it.conn !== conn); });
        if(players.length === 1) gameLoop();
    });
}

function gameLoop() {
    if(players.length === 0) return;
    requestAnimationFrame(gameLoop);
    
    players.forEach((p, idx) => {
        let nMult = p.input.n ? 2.5 : 1; 
        let acc = p.input.n ? 0.08 : 0.03;

        if(p.input.u) p.speed = Math.min(p.speed + acc, 2.0 * nMult);
        else p.speed *= 0.985;
        if(p.input.d) p.speed *= 0.85;

        p.car.translateZ(-p.speed);
        if(Math.abs(p.speed) > 0.1) {
            let turn = 0.045 * (p.speed > 0 ? 1 : -1);
            if(p.input.l) p.car.rotation.y += turn;
            if(p.input.r) p.car.rotation.y -= turn;
        }

        // Engine Audio Logic
        let freq = 45 + (p.speed * 80) + (p.input.n ? 120 : 0);
        p.audio.osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
        p.audio.gain.gain.setTargetAtTime(p.input.u ? 0.12 : 0.04, audioCtx.currentTime, 0.1);

        // Camera Logic & Shake
        let camPos = new THREE.Vector3(0, 6, 14).applyQuaternion(p.car.quaternion);
        if(p.input.n) camPos.add(new THREE.Vector3((Math.random()-0.5)*0.4, (Math.random()-0.5)*0.4, 0));
        p.cam.position.copy(p.car.position).add(camPos);
        p.cam.lookAt(p.car.position);
        
        // Split Screen Logic
        const h = window.innerHeight;
        p.cam.aspect = window.innerWidth / (players.length > 1 ? h/2 : h);
        p.cam.updateProjectionMatrix();
        
        if(players.length > 1) {
            renderer.setScissorTest(true);
            const rect = idx === 0 ? [0, h/2, window.innerWidth, h/2] : [0, 0, window.innerWidth, h/2];
            renderer.setViewport(...rect); renderer.setScissor(...rect);
        }
        renderer.render(scene, p.cam);
    });
}

// --- INPUT HANDLER ---
function setupControllerEvents() {
    const bind = (id, k) => {
        const el = document.getElementById(id);
        const startEv = (e) => { 
            e.preventDefault(); keys[k]=1; 
            window.activeConn.send(keys); el.classList.add('active'); 
        };
        const endEv = (e) => { 
            keys[k]=0; window.activeConn.send(keys); 
            el.classList.remove('active'); 
        };
        el.addEventListener('touchstart', startEv, {passive: false});
        el.addEventListener('touchend', endEv);
        el.addEventListener('mousedown', startEv);
        el.addEventListener('mouseup', endEv);
    };
    bind('u','u'); bind('d','d'); bind('l','l'); bind('r','r'); bind('nitro-btn','n');
}
</script>
</body>
</html>
