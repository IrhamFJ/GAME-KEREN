<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABC 5 DASAR - 2 MODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        :root {
            --bg-main: #0f172a; --primary: #38bdf8; --accent: #fbbf24;
            --white: #ffffff; --success: #22c55e; --danger: #ef4444;
            --card-bg: #1e293b; --log-bg: #020617;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; -webkit-user-select: none; user-select: none; }
        body { background: var(--bg-main); height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--white); }
        
        .game-card {
            width: 95%; max-width: 600px; background: var(--card-bg); border-radius: 30px; padding: 25px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); position: relative; text-align: center;
        }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .active { display: flex; animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 2.2rem; color: var(--primary); text-shadow: 0 0 15px rgba(56, 189, 248, 0.4); margin-bottom: 15px; }
        .btn { width: 100%; padding: 16px; margin-bottom: 12px; border-radius: 15px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-blue { background: var(--primary); color: var(--bg-main); box-shadow: 0 4px 0 #0284c7; }
        .btn-gold { background: var(--accent); color: #78350f; box-shadow: 0 4px 0 #b45309; }
        .btn-purple { background: #a855f7; color: white; box-shadow: 0 4px 0 #7e22ce; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 transparent; }
        .btn:disabled { background: #475569; color: #94a3b8; box-shadow: none; cursor: not-allowed; }

        input {
            width: 100%; padding: 18px; background: var(--log-bg); border: 3px solid #334155; border-radius: 15px;
            color: var(--white); font-size: 1.5rem; text-align: center; margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input.error { border-color: var(--danger); animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        .log-panel {
            width: 100%; height: 130px; background: var(--log-bg); border-radius: 15px; padding: 15px;
            font-size: 0.85rem; color: #94a3b8; text-align: left; overflow-y: auto; border: 1px solid #334155;
            margin-bottom: 15px; font-family: 'monospace'; line-height: 1.5;
        }
        .stats-bar { display: flex; justify-content: space-between; width: 100%; margin-bottom: 15px; font-size: 0.9rem; font-weight: 700; gap: 5px; }
        .stat-item { background: rgba(255,255,255,0.08); padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }

        .finger-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 15px 0; width: 100%; }
        .f-box {
            aspect-ratio: 1/1; background: #334155; border-radius: 15px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; font-weight: 700; color: #94a3b8; border: 3px solid transparent; font-size: 1.2rem;
        }
        .f-box.selected { border-color: var(--primary); background: rgba(56, 189, 248, 0.2); color: var(--primary); transform: scale(1.1); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        .progress-track { width: 100%; height: 12px; background: #334155; border-radius: 10px; margin: 20px 0; overflow: hidden; position: relative; }
        #t-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--primary), var(--success)); border-radius: 10px; transition: 0.1s linear; }

        .char-hero { font-size: 9rem; font-weight: 800; color: var(--white); margin: -5px 0; text-shadow: 0 0 30px rgba(255,255,255,0.3); z-index: 5; position: relative; }
        .combo-badge { position: absolute; top: -15px; right: -5px; background: var(--danger); color: white; padding: 6px 18px; border-radius: 25px; font-weight: 900; display: none; transform: rotate(12deg); z-index: 20; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body>

    <div class="game-card" id="main-card">
        <div id="scr-start" class="screen active">
            <h1>ABC 5 DASAR <span style="color:var(--accent)">PRO</span></h1>
            <button class="btn btn-blue" onclick="setup('MONITOR')">🖥️ Host Game (TV)</button>
            <button class="btn btn-gold" onclick="setup('CONTROL')">📱 Join Battle (HP)</button>
            <button class="btn btn-purple" onclick="setup('BOT')">🤖 Solo vs Bot</button>
        </div>

        <div id="scr-lobby" class="screen">
            <div class="stats-bar">
                <div class="stat-item">ROOM: <span id="room-id-txt" style="color:var(--accent)">---</span></div>
                <div class="stat-item">STATUS: <span id="p-count">IDLE</span></div>
            </div>
            <div class="log-panel" id="log-box">SYSTEM: Awaiting players...</div>
            <button class="btn btn-blue" id="btn-start-init" disabled onclick="nav('scr-jari')">INITIALIZE BATTLE</button>
        </div>

        <div id="scr-jari" class="screen">
            <h1>LOCK YOUR JARI</h1>
            <div class="finger-grid" id="f-grid"></div>
            <button class="btn btn-blue" onclick="confirmFingers()">READY TO BATTLE</button>
        </div>

        <div id="scr-arena" class="screen">
            <div class="combo-badge" id="c-badge">x2 COMBO</div>
            <div class="stats-bar">
                <div class="stat-item">LVL <span id="lvl">1</span></div>
                <div class="stat-item">EXP: <span id="exp">0</span></div>
            </div>
            <div class="char-hero" id="target-char">?</div>
            <div id="input-zone" style="width:100%">
                <input type="text" id="ans-in" placeholder="..." spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="characters">
            </div>
            <div class="progress-track"><div id="t-fill"></div></div>
            <p id="msg-box" style="font-weight: 800; text-transform: uppercase;">PREPARE!</p>
        </div>
    </div>

    <script>
        let state = { 
            mode: "", room: "", players: [], nick: "", fingers: new Set(), 
            char: "", timer: null, botTimer: null, lvl: 1, exp: 0, combo: 0, baseTime: 30,
            validating: false 
        };

        const botWords = {
            "A": ["AMBON", "ACEH", "AMERIKA"], "B": ["BANDUNG", "BALI", "BEKASI"],
            "C": ["CIANJUR", "CINA", "CHILE"], "D": ["DEPOK", "DUKU", "DENMARK"],
            "E": ["ETHIOPIA", "EROPA", "ELANG"], "F": ["FILIPINA", "FOTO", "FINLANDIA"],
            "G": ["GARUT", "GERMAN", "GAMBIR"], "H": ["HAWAII", "HIU", "HONGKONG"],
            "I": ["INDONESIA", "INDIA", "ITALIA"], "J": ["JAKARTA", "JEPANG", "JERUK"],
            "K": ["KENDARI", "KOREA", "KUWAIT"], "L": ["LAMPUNG", "LAOS", "LEMON"],
            "M": ["MEDAN", "MESIR", "MALAYSIA"], "N": ["NGANJUK", "NORWEGIA", "NANAS"],
            "O": ["OMAN", "OREGON", "ORANGE"], "P": ["PALU", "PERANCIS", "PAPUA"],
            "Q": ["QATAR", "QUEBEC", "QUITO"], "R": ["RIAU", "RUSIA", "ROMA"],
            "S": ["SOLO", "SURABAYA", "SPANYOL"], "T": ["TEGAL", "TURKI", "THAILAND"],
            "U": ["UGANDA", "UKRAINA", "URUGUAY"], "V": ["VIETNAM", "VENEZUELA", "VATICAN"],
            "W": ["WONOGIRI", "WALES", "WORTEL"], "X": ["XIAMEN", "XINJIANG", "X-RAY"],
            "Y": ["YOGYAKARTA", "YUNANI", "YAMAN"], "Z": ["ZAMBIA", "ZURICH", "ZONA"]
        };

        const grid = document.getElementById('f-grid');
        for(let i=1; i<=10; i++){
            let b = document.createElement('div'); b.className='f-box'; b.innerText=i;
            b.onclick = () => { 
                b.classList.toggle('selected'); 
                state.fingers.has(i) ? state.fingers.delete(i) : state.fingers.add(i); 
            };
            grid.appendChild(b);
        }

        function nav(id) { 
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
            document.getElementById(id).classList.add('active'); 
        }
        
        function setup(m) {
            state.mode = m;
            if(m === 'MONITOR') {
                state.room = Math.floor(100000 + Math.random() * 899999);
                document.getElementById('room-id-txt').innerText = state.room;
                nav('scr-lobby');
                log("ROOM CREATED. WAITING FOR CONTROLLER...");
            } else if (m === 'CONTROL') {
                let rInput = prompt("ENTER ROOM ID:");
                if(!rInput) return;
                state.room = rInput;
                state.nick = (prompt("YOUR NICKNAME:") || "PLAYER").toUpperCase();
                document.getElementById('p-count').innerText = "ONLINE";
                document.getElementById('btn-start-init').disabled = false;
                nav('scr-lobby'); 
                log(`CONNECTED AS ${state.nick}`, "#22c55e");
            } else if (m === 'BOT') {
                state.nick = "PLAYER";
                state.room = "SOLO";
                document.getElementById('room-id-txt').innerText = "SOLO";
                document.getElementById('p-count').innerText = "BOT ACTIVE";
                document.getElementById('btn-start-init').disabled = false;
                nav('scr-lobby');
                log("BOT 'ALGORITMA' HAS JOINED.", "#a855f7");
            }
        }

        function log(m, c="#94a3b8") {
            const box = document.getElementById('log-box');
            if(box) {
                box.innerHTML += `<div style="color:${c}">> ${m}</div>`;
                box.scrollTop = box.scrollHeight;
            }
        }

        function confirmFingers() {
            if(state.fingers.size === 0) return alert("Pilih minimal 1 jari!");
            nav('scr-arena'); 
            setTimeout(startRound, 1000);
        }

        function startRound() {
            if(state.timer) clearInterval(state.timer);
            if(state.botTimer) clearTimeout(state.botTimer);
            state.validating = false;
            state.char = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];
            
            document.getElementById('target-char').innerText = state.char;
            const input = document.getElementById('ans-in');
            input.value = "";
            input.disabled = false;
            document.getElementById('msg-box').innerText = state.mode === 'BOT' ? "BEAT THE BOT!" : "TYPE NOW!";
            document.getElementById('msg-box').style.color = "var(--white)";
            document.getElementById('main-card').style.borderColor = "rgba(255,255,255,0.1)";
            
            let timeLimit = Math.max(5, state.baseTime - (state.lvl * 1.5));
            let current = timeLimit;
            const bar = document.getElementById('t-fill');
            bar.style.width = "100%";
            
            state.timer = setInterval(() => {
                current -= 0.1;
                bar.style.width = (current/timeLimit)*100 + "%";
                if(current <= 0) { clearInterval(state.timer); finish(false, "TIME OUT"); }
            }, 100);

            if(state.mode === 'BOT') {
                let botSpeed = Math.max(1200, 4500 - (state.lvl * 450)); 
                state.botTimer = setTimeout(() => {
                    if(!state.validating) {
                        let botAns = botWords[state.char][Math.floor(Math.random() * botWords[state.char].length)];
                        finish(false, "BOT WON WITH: " + botAns);
                    }
                }, botSpeed);
            }

            if(state.mode === 'MONITOR') {
                document.getElementById('input-zone').style.display = 'none';
                log(`ROUND START: ${state.char}`, "#fbbf24");
            }
            setTimeout(() => input.focus(), 50);
        }

        async function finish(win, ans) {
            if(state.validating && win) return; 
            state.validating = true;
            clearInterval(state.timer);
            clearTimeout(state.botTimer);
            
            const msg = document.getElementById('msg-box');
            document.getElementById('ans-in').disabled = true;

            if(win) {
                state.combo++;
                let gain = Math.floor(10 * state.lvl * (state.combo > 1 ? 1.5 : 1));
                state.exp += gain;
                msg.innerText = "VERIFIED! +" + gain + " EXP";
                msg.style.color = "var(--success)";
                if(state.exp >= state.lvl * 50) { state.lvl++; state.exp = 0; log(`LVL UP TO ${state.lvl}!`, "#38bdf8"); }
                if(state.combo > 1) { 
                    const cb = document.getElementById('c-badge');
                    cb.innerText = `x${state.combo} COMBO 🔥`; cb.style.display = 'block'; 
                }
                log(`${state.nick}: ${ans} (SUCCESS)`, "#22c55e");
            } else {
                state.combo = 0;
                document.getElementById('c-badge').style.display = 'none';
                msg.innerText = ans.includes("BOT") ? "BOT WON! 🤖" : "FAILED!";
                msg.style.color = "var(--danger)";
                document.getElementById('main-card').style.borderColor = "var(--danger)";
                log(ans.includes("BOT") ? ans : `${state.nick} FAILED`, "#ef4444");
            }
            
            document.getElementById('lvl').innerText = state.lvl;
            document.getElementById('exp').innerText = state.exp;
            setTimeout(startRound, 3000);
        }

        const inputField = document.getElementById('ans-in');
        inputField.addEventListener('input', function() {
            let val = this.value.toUpperCase();
            if(val.length > 0 && val[0] !== state.char) {
                this.classList.add('error');
                setTimeout(() => this.classList.remove('error'), 300);
                this.value = ""; 
            }
        });

        inputField.addEventListener('keypress', async function(e) {
            if(e.key === 'Enter') {
                let ans = this.value.trim().toUpperCase();
                if(!ans || ans[0] !== state.char || state.validating) return;
                
                clearTimeout(state.botTimer);
                document.getElementById('msg-box').innerText = "VALIDATING...";
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${ans}&format=json&limit=1`, { signal: AbortSignal.timeout(3500) });
                    const data = await res.json();
                    data.length > 0 ? finish(true, ans) : finish(false, "NOT FOUND");
                } catch(err) { finish(true, ans); }
            }
        });
    </script>
</body>
</html>
