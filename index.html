<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap Tap 1v1 P2P</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        :root { --p1: #ff4757; --p2: #2e86de; }
        body { font-family: 'Segoe UI', sans-serif; background: #2f3542; color: white; text-align: center; margin: 0; overflow: hidden; touch-action: manipulation; }
        .screen { display: none; padding: 20px; flex-direction: column; align-items: center; justify-content: center; height: 100vh; box-sizing: border-box; }
        .active { display: flex; }
        
        button { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; margin: 10px; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-p1 { background: var(--p1); color: white; }
        .btn-p2 { background: var(--p2); color: white; }
        input { padding: 15px; border-radius: 8px; border: none; width: 250px; font-size: 1rem; margin-bottom: 10px; text-align: center; }

        #track { width: 90%; height: 80px; background: #57606f; border-radius: 40px; display: flex; overflow: hidden; position: relative; margin: 40px 0; border: 5px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .bar { height: 100%; transition: width 0.1s ease-out; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #room-id-display { background: #eccc68; color: #2f3542; padding: 5px 15px; border-radius: 5px; font-family: monospace; font-size: 1.5rem; display: inline-block; margin-top: 10px; }

        .tap-area { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border: none; font-size: 4rem; font-weight: bold; color: white; user-select: none; }
        #status-text { min-height: 1.5em; font-size: 1.5rem; color: #ffa502; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <h1>TAPTAP 1V1</h1>
        <button class="btn-p2" onclick="initMonitor()">JADI MONITOR</button>
        <div style="margin: 20px 0; opacity: 0.5;">━━━━ ATAU ━━━━</div>
        <input type="text" id="join-id" placeholder="Masukkan ID Room">
        <button class="btn-p1" onclick="initController()">MASUK ROOM (HP)</button>
    </div>

    <div id="monitor-screen" class="screen">
        <h2>ROOM ID: <br><span id="room-id-display">Generating...</span></h2>
        <h3 id="status-text">Inisialisasi...</h3>
        
        <div id="track">
            <div id="bar-p1" class="bar" style="width: 50%; background: var(--p1);">P1</div>
            <div id="bar-p2" class="bar" style="width: 50%; background: var(--p2);">P2</div>
        </div>
        <p>Gunakan HP untuk menekan tombol!</p>
    </div>

    <div id="controller-screen" class="screen" style="padding:0;">
        <button id="btn-tap" class="tap-area">CONNECTING...</button>
    </div>

    <script>
        let peer = null;
        let players = {}; // Object untuk nyimpen koneksi aktif {role: conn}
        let score = 50;
        let gameActive = false;

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- LOGIKA MONITOR (DISPLAY) ---
        function initMonitor() {
            showScreen('monitor-screen');
            peer = new Peer();

            peer.on('open', (id) => {
                document.getElementById('room-id-display').innerText = id;
                updateStatus();
            });

            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    let role = "";
                    if (!players.p1) {
                        players.p1 = conn;
                        role = "p1";
                    } else if (!players.p2) {
                        players.p2 = conn;
                        role = "p2";
                    }

                    if (role) {
                        conn.send({ type: 'init', role: role });
                        updateStatus();
                    } else {
                        conn.send({ type: 'error', msg: 'Room Penuh!' });
                        conn.close();
                    }
                });

                conn.on('data', (data) => {
                    if (data.type === 'tap' && gameActive) {
                        if (data.role === 'p1') score += 2;
                        if (data.role === 'p2') score -= 2;
                        updateDisplay();
                    }
                });

                conn.on('close', () => {
                    if (players.p1 === conn) delete players.p1;
                    if (players.p2 === conn) delete players.p2;
                    gameActive = false;
                    updateStatus();
                });
            });
        }

        function updateStatus() {
            const status = document.getElementById('status-text');
            const count = Object.keys(players).length;
            
            if (count === 0) {
                status.innerText = "Menunggu Pemain...";
                gameActive = false;
            } else if (count === 1) {
                status.innerText = "Menunggu Lawan...";
                gameActive = false;
            } else {
                status.innerText = "GAME DIMULAI!";
                gameActive = true;
                score = 50; // Reset score pas game mulai
                updateDisplay();
            }
        }

        function updateDisplay() {
            const bar1 = document.getElementById('bar-p1');
            const bar2 = document.getElementById('bar-p2');
            
            bar1.style.width = score + '%';
            bar2.style.width = (100 - score) + '%';

            if (score >= 100) {
                gameActive = false;
                setTimeout(() => { alert("PLAYER 1 (MERAH) MENANG!"); resetGame(); }, 50);
            } else if (score <= 0) {
                gameActive = false;
                setTimeout(() => { alert("PLAYER 2 (BIRU) MENANG!"); resetGame(); }, 50);
            }
        }

        function resetGame() {
            score = 50;
            updateDisplay();
            updateStatus();
        }

        // --- LOGIKA CONTROLLER (HP) ---
        function initController() {
            const roomId = document.getElementById('join-id').value.trim();
            if (!roomId) return alert("Isi ID Room-nya dulu!");

            showScreen('controller-screen');
            const btn = document.getElementById('btn-tap');
            btn.disabled = true; // Jangan kasih tap sebelum ready

            peer = new Peer();
            
            peer.on('open', () => {
                const conn = peer.connect(roomId);

                conn.on('open', () => {
                    conn.on('data', (data) => {
                        if (data.type === 'init') {
                            btn.innerText = "SIAP!";
                            btn.style.background = data.role === 'p1' ? 'var(--p1)' : 'var(--p2)';
                            btn.disabled = false;

                            // Hapus listener lama biar gak double tap bug
                            btn.onclick = (e) => {
                                e.preventDefault();
                                conn.send({ type: 'tap', role: data.role });
                                if (navigator.vibrate) navigator.vibrate(40);
                            };
                        }
                        if (data.type === 'error') {
                            alert(data.msg);
                            location.reload();
                        }
                    });
                });

                conn.on('close', () => {
                    alert("Koneksi ke Monitor Terputus!");
                    location.reload();
                });
            });

            peer.on('error', (err) => {
                alert("Gagal nyambung: " + err.type);
                location.reload();
            });
        }
    </script>
</body>
</html>
